---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  NS: self-hosted
  DEPLOYMENT: nominatim
  CONTAINER: nominatim
  CRONJOB: nominatim-update-osm-db
  KEXEC: kubectl -n {{.NS}} exec deploy/{{.DEPLOYMENT}} -c {{.CONTAINER}} --
  SOURCE_PVC: nominatim-pgdata
  SOURCE_PGDATA: /var/lib/postgresql/16/main
  CNPG_PVC: nominatim-db-1
  CNPG_PGDATA: /var/lib/postgresql/data/pgdata

tasks:
  default:
    desc: List temporary Nominatim CNPG migration tasks
    cmd: task --list --tasks nominatim-cnpg
    silent: true

  pgdata-sizes:
    desc: Compare legacy vs CNPG pgdata used/capacity (soak / rollback context)
    silent: true
    cmds:
      - |
        set -euo pipefail
        ns="{{.NS}}"
        src_pvc="{{.SOURCE_PVC}}"
        cnpg_pvc="{{.CNPG_PVC}}"
        src_path="{{.SOURCE_PGDATA}}"
        cnpg_path="{{.CNPG_PGDATA}}"

        src_cap="$(kubectl -n "${ns}" get pvc "${src_pvc}" -o jsonpath='{.status.capacity.storage}' 2>/dev/null || echo '?')"
        cnpg_cap="$(kubectl -n "${ns}" get pvc "${cnpg_pvc}" -o jsonpath='{.status.capacity.storage}' 2>/dev/null || echo '?')"

        src_used_h="?"
        if kubectl -n "${ns}" get deploy/{{.DEPLOYMENT}} >/dev/null 2>&1; then
          src_used_h="$(kubectl -n "${ns}" exec deploy/{{.DEPLOYMENT}} -c {{.CONTAINER}} -- \
            du -sh "${src_path}" 2>/dev/null | awk '{print $1}')" || src_used_h="(unmounted or missing)"
        else
          src_used_h="(deploy missing)"
        fi

        cnpg_pod="$(kubectl -n "${ns}" get pods -l cnpg.io/cluster=nominatim-db \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
        cnpg_used_h="?"
        if [ -n "${cnpg_pod}" ]; then
          cnpg_ctr="$(kubectl -n "${ns}" get pod "${cnpg_pod}" -o jsonpath='{.spec.containers[0].name}')"
          cnpg_used_h="$(kubectl -n "${ns}" exec "${cnpg_pod}" -c "${cnpg_ctr}" -- \
            du -sh "${cnpg_path}" 2>/dev/null | awk '{print $1}')" || cnpg_used_h="?"
        fi

        echo "pgdata_legacy: ${src_used_h} used / ${src_cap} cap  (pvc/${src_pvc})"
        echo "pgdata_cnpg:   ${cnpg_used_h} used / ${cnpg_cap} cap  (pvc/${cnpg_pvc}${cnpg_pod:+ @ ${cnpg_pod}})"
    preconditions:
      - which kubectl

  cnpg-status:
    desc: Read-only CNPG cluster and ScheduledBackup status
    silent: true
    cmds:
      - "echo 'cluster: {{.CLUSTER_STATUS}}'"
      - "echo 'instances: {{.INSTANCES}}'"
      - "echo 'scheduled_backup: {{.SBACKUP}}'"
      - "echo 'osm_cronjob_suspended: {{.CRON_SUSPENDED}}'"
      - task: pgdata-sizes
      - "echo 'cutover_runbook: docs/runbooks/2026-07-24-nominatim-cnpg-cutover.md'"
    vars:
      CLUSTER_STATUS:
        sh: >-
          kubectl -n {{.NS}} get cluster.postgresql.cnpg.io nominatim-db
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "(not found)"
      INSTANCES:
        sh: >-
          kubectl -n {{.NS}} get pods -l cnpg.io/cluster=nominatim-db
          -o wide 2>/dev/null || echo "(none)"
      SBACKUP:
        sh: >-
          kubectl -n {{.NS}} get scheduledbackup.postgresql.cnpg.io nominatim-db
          -o jsonpath='schedule={.spec.schedule} immediate={.spec.immediate} method={.spec.method}' 2>/dev/null
          || echo "(not found)"
      CRON_SUSPENDED:
        sh: >-
          kubectl -n {{.NS}} get cronjob {{.CRONJOB}}
          -o jsonpath='{.spec.suspend}' 2>/dev/null || echo unknown
    preconditions:
      - which kubectl

  cutover-scale-down:
    desc: "Cutover: suspend Flux HelmRelease and scale Nominatim API to 0"
    interactive: true
    prompt: Suspend HelmRelease nominatim and scale the API to 0 replicas?
    cmds:
      - flux suspend helmrelease {{.DEPLOYMENT}} -n {{.NS}}
      - kubectl -n {{.NS}} scale deploy/{{.DEPLOYMENT}} --replicas=0
      - kubectl -n {{.NS}} rollout status deploy/{{.DEPLOYMENT}} --timeout=5m
    preconditions:
      - which kubectl flux
      - kubectl -n {{.NS}} get deploy {{.DEPLOYMENT}}

  cutover-scale-up:
    desc: "Cutover: scale Nominatim API to 1 and resume Flux HelmRelease"
    cmds:
      - kubectl -n {{.NS}} scale deploy/{{.DEPLOYMENT}} --replicas=1
      - flux resume helmrelease {{.DEPLOYMENT}} -n {{.NS}}
    preconditions:
      - which kubectl flux

  help:
    desc: Print remaining cutover / soak tasks (no cluster writes)
    silent: true
    cmds:
      - |
        cat <<'EOF'
        Runbook (historical + remaining steps):
          docs/runbooks/2026-07-24-nominatim-cnpg-cutover.md

        Still useful after promote:
          task nominatim-cnpg:cnpg-status
          task nominatim-cnpg:pgdata-sizes
          task nominatim-cnpg:cutover-scale-down
          task nominatim-cnpg:cutover-scale-up

        After soak/cleanup, delete .taskfiles/nominatim-cnpg and its root include.
        EOF
