# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: '3'

vars:
  FUNCTIONS_DIR: '{{.ROOT_DIR}}/kubernetes/apps/fission-system/functions/app'

tasks:

  sync-packages:
    desc: Regenerate Package CRDs for any staged function code changes
    cmds:
      - |
        staged=$(git diff --cached --name-only --diff-filter=ACM | grep -E 'kubernetes/apps/fission-system/functions/app/.+/code\.py$' || true)
        if [ -z "$staged" ]; then
          exit 0
        fi
        for py in $staged; do
          pkg="$(dirname "$py")/package.yaml"
          if [ ! -f "$pkg" ]; then
            echo "warning: no package.yaml found alongside $py, skipping"
            continue
          fi
          b64=$(base64 -w0 "$py")
          yq -i ".spec.deployment.literal = \"$b64\"" "$pkg"
          git add "$pkg"
          echo "updated $pkg"
        done
    preconditions:
      - which yq

  sync-all-packages:
    desc: Regenerate all Package CRDs from function source code
    cmds:
      - |
        for py in $(find {{.FUNCTIONS_DIR}} -name "code.py"); do
          pkg="$(dirname "$py")/package.yaml"
          if [ ! -f "$pkg" ]; then
            echo "warning: no package.yaml found alongside $py, skipping"
            continue
          fi
          b64=$(base64 -w0 "$py")
          yq -i ".spec.deployment.literal = \"$b64\"" "$pkg"
          echo "updated $pkg"
        done
    preconditions:
      - which yq

  new-function:
    desc: Scaffold a new Fission function directory
    requires:
      vars: [NAME]
    cmds:
      - mkdir -p {{.FUNCTIONS_DIR}}/{{.NAME}}
      - |
        cat > {{.FUNCTIONS_DIR}}/{{.NAME}}/code.py << 'EOF'
        def main():
            return "hello from {{.NAME}}", 200, {}
        EOF
      - |
        cat > {{.FUNCTIONS_DIR}}/{{.NAME}}/package.yaml << 'EOF'
        ---
        apiVersion: fission.io/v1
        kind: Package
        metadata:
          name: {{.NAME}}
          namespace: fission
        spec:
          environment:
            name: python
            namespace: fission
          deployment:
            type: literal
            literal: ""
        EOF
      - |
        cat > {{.FUNCTIONS_DIR}}/{{.NAME}}/function.yaml << 'EOF'
        ---
        apiVersion: fission.io/v1
        kind: Function
        metadata:
          name: {{.NAME}}
          namespace: fission
        spec:
          environment:
            name: python
            namespace: fission
          package:
            packageref:
              name: {{.NAME}}
              namespace: fission
            functionName: main
          executor:
            executortype: poolmgr
            requestsPerPod: 1
          functionTimeout: 60
          idleTimeout: 120
        EOF
      - |
        cat > {{.FUNCTIONS_DIR}}/{{.NAME}}/trigger.yaml << 'EOF'
        ---
        apiVersion: fission.io/v1
        kind: HTTPTrigger
        metadata:
          name: {{.NAME}}
          namespace: fission
        spec:
          relativeurl: /{{.NAME}}
          method: GET
          functionref:
            type: name
            name: {{.NAME}}
          ingressconfig:
            annotations: {}
        EOF
      - |
        cat > {{.FUNCTIONS_DIR}}/{{.NAME}}/kustomization.yaml << 'EOF'
        # yaml-language-server: $schema=https://json.schemastore.org/kustomization
        ---
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - package.yaml
          - function.yaml
          - trigger.yaml
        EOF
      - task: sync-all-packages
      - echo "scaffolded {{.FUNCTIONS_DIR}}/{{.NAME}} — add it to functions/app/kustomization.yaml"
