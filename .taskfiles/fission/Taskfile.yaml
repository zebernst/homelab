# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
version: '3'

vars:
  FUNCTIONS_DIR: '{{.ROOT_DIR}}/kubernetes/apps/fission/functions'

tasks:

  # ── Public CLI ──────────────────────────────────────────────────

  sync:
    desc: Sync package literal from source and rebuild on cluster [NAME=required]
    requires:
      vars: [NAME]
    cmds:
      - task: _update-literal
        vars: { NAME: '{{.NAME}}' }
      - task: rebuild
        vars: { NAME: '{{.NAME}}' }

  sync-all:
    desc: Sync all packages from source and rebuild on cluster
    vars:
      NAMES:
        sh: find '{{.FUNCTIONS_DIR}}' -name "main.py" -exec dirname {} \; | xargs -I{} basename {}
    cmds:
      - for: { var: NAMES, split: "\n" }
        task: sync
        vars:
          NAME: '{{.ITEM}}'

  check:
    desc: Check if package literal matches source [NAME=required]
    requires:
      vars: [NAME]
    cmds:
      - task: _check-literal
        vars: { NAME: '{{.NAME}}' }

  rebuild:
    desc: Force rebuild package on cluster without resyncing source [NAME=required]
    vars:
      PKG: '{{.FUNCTIONS_DIR}}/{{.NAME}}/package.yaml'
    requires:
      vars: [NAME]
    cmds:
      - fission package delete --name '{{.NAME}}' --namespace fission --force
      - kubectl apply -f '{{.PKG}}'
    preconditions:
      - test -f '{{.PKG}}'

  new-function:
    desc: Scaffold a new Fission function [NAME=required]
    requires:
      vars: [NAME]
    vars:
      FUNC_DIR: '{{.FUNCTIONS_DIR}}/{{.NAME}}'
      PKG: '{{.FUNCTIONS_DIR}}/{{.NAME}}/package.yaml'
    cmds:
      - mkdir -p '{{.FUNC_DIR}}'
      - |
        cat > '{{.FUNC_DIR}}/pyproject.toml' << EOF
        [project]
        name = "{{.NAME}}"
        version = "0.1.0"
        requires-python = ">=3.11"
        dependencies = []
        EOF
      - |
        cat > '{{.FUNC_DIR}}/main.py' << 'PYEOF'
        def main():
            return "hello from new function", 200, {}
        PYEOF
      - |
        cat > '{{.PKG}}' << EOF
        ---
        apiVersion: fission.io/v1
        kind: Package
        metadata:
          name: {{.NAME}}
          namespace: fission
        spec:
          environment:
            name: python
            namespace: fission
          source:
            type: literal
            literal: ""
        EOF
      - task: _update-literal
        vars: { NAME: '{{.NAME}}' }
      - kubectl apply -f '{{.PKG}}'
      - fission fn create --name '{{.NAME}}' --env python --pkg '{{.NAME}}' --entrypoint main.main --namespace fission
      - fission route create --name '{{.NAME}}' --method GET --url '/{{.NAME}}' --function '{{.NAME}}' --namespace fission --fnNamespace fission
      - |
        kubectl get function {{.NAME}} -n fission -o yaml \
          | yq 'del(.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.generation,.metadata.managedFields,.metadata.annotations,.status)' \
          > '{{.FUNC_DIR}}/function.yaml'
      - |
        kubectl get httptrigger {{.NAME}} -n fission -o yaml \
          | yq 'del(.metadata.resourceVersion,.metadata.uid,.metadata.creationTimestamp,.metadata.generation,.metadata.managedFields,.metadata.annotations,.status)' \
          > '{{.FUNC_DIR}}/trigger.yaml'
      - |
        cat > '{{.FUNC_DIR}}/kustomization.yaml' << 'EOF'
        # yaml-language-server: $schema=https://json.schemastore.org/kustomization
        ---
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
          - package.yaml
          - function.yaml
          - trigger.yaml
        EOF
      - echo "scaffolded — add '- {{.NAME}}' to functions/kustomization.yaml"
    preconditions:
      - which yq
      - which zip
      - which fission
      - which kubectl

  # ── hk hook entry points ────────────────────────────────────────
  # Called by hk pre-commit; update literals and stage, no cluster ops.

  hook-fix:
    vars:
      NAMES:
        sh: echo '{{.CLI_ARGS}}' | tr ' ' '\n' | xargs -I{} dirname {} | xargs -I{} basename {} | sort -u
    cmds:
      - for: { var: NAMES, split: "\n" }
        task: _update-literal
        vars:
          NAME: '{{.ITEM}}'
          STAGE: "true"
    preconditions:
      - which yq
      - which zip

  hook-check:
    vars:
      NAMES:
        sh: echo '{{.CLI_ARGS}}' | tr ' ' '\n' | xargs -I{} dirname {} | xargs -I{} basename {} | sort -u
    cmds:
      - for: { var: NAMES, split: "\n" }
        task: _check-literal
        vars:
          NAME: '{{.ITEM}}'
    preconditions:
      - which yq
      - which zip

  # ── Internal ────────────────────────────────────────────────────

  _update-literal:
    internal: true
    silent: true
    vars:
      STAGE: '{{.STAGE | default "false"}}'
      FUNC_DIR: '{{.FUNCTIONS_DIR}}/{{.NAME}}'
      PKG: '{{.FUNCTIONS_DIR}}/{{.NAME}}/package.yaml'
    requires:
      vars: [NAME]
    cmds:
      - |
        cd '{{.FUNC_DIR}}'
        if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
          deps=$([ -f pyproject.toml ] && echo pyproject.toml || echo requirements.txt)
          lock=$([ -f uv.lock ] && echo uv.lock || echo "")
          b64=$(zip -jq - *.py "$deps" $lock | base64 -w0)
          yq -i ".spec.source.type = \"literal\" | .spec.source.literal = \"$b64\" | del(.spec.deployment)" '{{.PKG}}'
        else
          b64=$(base64 -w0 main.py)
          yq -i ".spec.deployment.type = \"literal\" | .spec.deployment.literal = \"$b64\" | del(.spec.source)" '{{.PKG}}'
        fi
      - '[ "{{.STAGE}}" != "true" ] || git add {{.PKG}}'
    preconditions:
      - test -f '{{.FUNC_DIR}}/main.py'
      - test -f '{{.PKG}}'
      - which yq
      - which zip

  _check-literal:
    internal: true
    silent: true
    vars:
      FUNC_DIR: '{{.FUNCTIONS_DIR}}/{{.NAME}}'
      PKG: '{{.FUNCTIONS_DIR}}/{{.NAME}}/package.yaml'
    requires:
      vars: [NAME]
    cmds:
      - |
        cd '{{.FUNC_DIR}}'
        if [ -f pyproject.toml ] || [ -f requirements.txt ]; then
          deps=$([ -f pyproject.toml ] && echo pyproject.toml || echo requirements.txt)
          lock=$([ -f uv.lock ] && echo uv.lock || echo "")
          expected=$(zip -jq - *.py "$deps" $lock | base64 -w0)
          actual=$(yq '.spec.source.literal' '{{.PKG}}')
        else
          expected=$(base64 -w0 main.py)
          actual=$(yq '.spec.deployment.literal' '{{.PKG}}')
        fi
        [ "$expected" = "$actual" ]
    preconditions:
      - test -f '{{.FUNC_DIR}}/main.py'
      - test -f '{{.PKG}}'
      - which yq
      - which zip
