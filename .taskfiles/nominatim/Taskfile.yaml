---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  # Local task resources
  NOMINATIM_DIR: '{{.ROOT_DIR}}/.taskfiles/nominatim'
  RESOURCES_DIR: '{{.NOMINATIM_DIR}}/resources'

  # Cluster targeting
  NS: self-hosted
  DEPLOYMENT: nominatim
  CONTAINER: nominatim
  CRONJOB: nominatim-update-osm-db
  KEXEC: kubectl -n {{.NS}} exec deploy/{{.DEPLOYMENT}} -c {{.CONTAINER}} --

  # PersistentVolumeClaims
  PGDATA_CLAIM: nominatim-pgdata
  FLATNODE_CLAIM: nominatim-flatnode
  PROJECT_CLAIM: nominatim-project

  # Region-import Jobs
  IMPORT_JOB_COMPONENT: nominatim-region-import
  # Full Geofabrik add-data can run multi-day; kill stuck Jobs after 7d.
  IMPORT_DEADLINE_SECONDS: "604800"

  # Source-replication prep (CNPG migration, see nominatim-db)
  PG_SOURCE_SVC: nominatim-pg-source
  REPL_ROLE: cnpg_replica
  REPL_SECRET: nominatim-replication
  # Cluster pod CIDR (talos/machineconfig.yaml.j2 podSubnets)
  REPL_CIDR: 10.244.0.0/16

tasks:

  default:
    desc: List Nominatim maintenance tasks
    cmd: task --list --tasks nominatim
    silent: true

  check-config:
    desc: Show Nominatim .env flatnode setting and whether bootstrap used flatnode
    silent: true
    cmds:
      - "echo 'flatnode: {{.FLATNODE}} ({{.FLATNODE_SIZE}})'"
      - echo
      - "echo paths:"
      - "echo '  env: {{.FLATNODE_ENV}}'"
      - "echo '  dotenv: {{.FLATNODE_DOTENV}}'"
      - "echo '  osm2pgsql: {{.FLATNODE_DB}}'"
      - "echo 'paths_match: {{.PATHS_MATCH}}'"
      - echo
      - "echo osm2pgsql:"
      - "echo '{{.OSM2PGSQL_PROPS}}'"
    vars:
      FLATNODE:
        sh: '{{.KEXEC}} test -s /nominatim/flatnode/flatnode.file && echo true || echo false'
      FLATNODE_SIZE:
        sh: >-
          {{.KEXEC}} ls -lh /nominatim/flatnode/flatnode.file 2>/dev/null
          | awk '{print $5}' || echo none
      FLATNODE_ENV:
        sh: '{{.KEXEC}} printenv NOMINATIM_FLATNODE_FILE 2>/dev/null || echo unset'
      FLATNODE_DOTENV:
        sh: >-
          {{.KEXEC}} grep -E ^NOMINATIM_FLATNODE_FILE= /nominatim/.env 2>/dev/null
          | cut -d= -f2- || echo unset
      FLATNODE_DB:
        sh: >-
          {{.KEXEC}} sudo -u postgres psql -d nominatim -At
          -c "SELECT value FROM osm2pgsql_properties WHERE property = 'flat_node_file';"
          2>/dev/null || echo unset
      PATHS_MATCH:
        sh: |
          if [ "{{.FLATNODE_ENV}}" = "{{.FLATNODE_DOTENV}}" ] \
            && [ "{{.FLATNODE_ENV}}" = "{{.FLATNODE_DB}}" ] \
            && [ "{{.FLATNODE_ENV}}" != "unset" ]; then
            echo true
          else
            echo false
          fi
      OSM2PGSQL_PROPS:
        sh: >-
          {{.KEXEC}} sudo -u postgres psql -d nominatim -At -F': '
          -c "SELECT property, value FROM osm2pgsql_properties ORDER BY 1;"
          2>/dev/null | sed 's/^/  /' || echo "  (unavailable)"
    preconditions:
      - kubectl -n {{.NS}} get deploy {{.DEPLOYMENT}}
      - which kubectl

  status:
    desc: Show import-finished, flatnode, imported regions, pending regions, and import Jobs
    silent: true
    cmds:
      - "echo 'import_finished: {{.IMPORT_FINISHED}}'"
      - "echo 'flatnode: {{.FLATNODE}} ({{.FLATNODE_SIZE}})'"
      - echo
      - "echo 'imported:'"
      - "echo '{{.IMPORTED_LIST}}'"
      - echo
      - "echo 'pending:'"
      - "echo '{{.PENDING_LIST}}'"
      - echo
      - "echo import_jobs:"
      - "echo '{{.IMPORT_JOBS}}'"
    vars:
      IMPORT_FINISHED:
        sh: >-
          {{.KEXEC}} sh -c 'test -f /nominatim/import-finished || test -f /var/lib/postgresql/16/main/import-finished'
          && echo true || echo false
      FLATNODE:
        sh: '{{.KEXEC}} test -s /nominatim/flatnode/flatnode.file && echo true || echo false'
      FLATNODE_SIZE:
        sh: >-
          {{.KEXEC}} ls -lh /nominatim/flatnode/flatnode.file 2>/dev/null
          | awk '{print $5}' || echo none
      # Newline-separated Geofabrik paths (NOMINATIM_REGIONS may be comma, space, or newline delimited).
      _REGIONS:
        sh: >-
          {{.KEXEC}} printenv NOMINATIM_REGIONS
          | tr ', ' '\n' | sed '/^[[:space:]]*$/d'
      _IMPORTED:
        sh: '{{.KEXEC}} cat /nominatim/imported-regions.txt 2>/dev/null | sed "/^[[:space:]]*$/d" || true'
      _PENDING:
        sh: |
          printf '%s\n' "{{._REGIONS}}" | while IFS= read -r region; do
            [ -z "${region}" ] && continue
            printf '%s\n' "{{._IMPORTED}}" | grep -qxF "${region}" || printf '%s\n' "${region}"
          done
      IMPORTED_LIST:
        sh: |
          if [ -z "{{._IMPORTED}}" ]; then echo "  (none)"; else printf '%s\n' "{{._IMPORTED}}" | sed 's/^/  - /'; fi
      PENDING_LIST:
        sh: |
          if [ -z "{{._PENDING}}" ]; then echo "  (none)"; else printf '%s\n' "{{._PENDING}}" | sed 's/^/  - /'; fi
      IMPORT_JOBS:
        sh: |
          jobs="$(kubectl -n {{.NS}} get jobs \
            -l app.kubernetes.io/component={{.IMPORT_JOB_COMPONENT}} \
            --no-headers 2>/dev/null | awk '{print $1}')"
          if [ -z "${jobs}" ]; then echo "  (none)"; else printf '%s\n' "${jobs}" | sed 's/^/  - /'; fi
    preconditions:
      - kubectl -n {{.NS}} get deploy {{.DEPLOYMENT}}
      - which kubectl

  reset-for-flatnode:
    desc: Wipe Postgres + flatnode PVCs and re-run US bootstrap import with flatnode (~24h+)
    prompt: |-
      This DELETES all Nominatim search data and re-imports north-america/us from scratch.
      pgdata and flatnode PVCs are removed; nominatim-project keeps Volsync backups but imported-regions.txt is cleared.
      After the pod restarts, wait until flatnode.file is ~100GB and /status is healthy before adding regions.
      Follow: kubectl -n {{.NS}} logs -f deployment/{{.DEPLOYMENT}} -c {{.CONTAINER}}
      Then: task nominatim:check-config
      Continue?
    cmds:
      - kubectl -n {{.NS}} scale deployment/{{.DEPLOYMENT}} --replicas=0
      - kubectl -n {{.NS}} wait deployment/{{.DEPLOYMENT}} --for=jsonpath='{.status.replicas}'=0 --timeout=10m
      - kubectl -n {{.NS}} delete pvc {{.PGDATA_CLAIM}} {{.FLATNODE_CLAIM}} --ignore-not-found=true --wait=true
      - kubectl -n {{.NS}} delete pod/nominatim-reset-project --ignore-not-found=true --wait=true
      - minijinja-cli {{.RESOURCES_DIR}}/reset-project-pod.yaml.j2 | kubectl apply --filename -
      - kubectl -n {{.NS}} wait pod/nominatim-reset-project --for=jsonpath='{.status.phase}'=Succeeded --timeout=2m
      - kubectl -n {{.NS}} logs pod/nominatim-reset-project
      - kubectl -n {{.NS}} delete pod/nominatim-reset-project --wait=true
      - kubectl -n {{.NS}} scale deployment/{{.DEPLOYMENT}} --replicas=1
    env:
      NS: '{{.NS}}'
      PROJECT_CLAIM: '{{.PROJECT_CLAIM}}'
    preconditions:
      - test -f {{.RESOURCES_DIR}}/reset-project-pod.yaml.j2
      - kubectl -n {{.NS}} get deploy {{.DEPLOYMENT}}
      - kubectl -n {{.NS}} get pvc {{.PROJECT_CLAIM}}
      - which kubectl minijinja-cli

  import-region:
    desc: Spawn an in-cluster Job to import a Geofabrik region [REGION=next|north-america/canada]
    interactive: true
    prompt: |-
      Import {{if eq .REGION "next"}}the next pending region{{else}}{{.REGION}}{{end}} via an in-cluster Job?
      This can take many hours and heavily loads Postgres.
      Continue?
    cmds:
      - minijinja-cli {{.RESOURCES_DIR}}/import-job.yaml.j2 | kubectl create --filename -
      - kubectl -n {{.NS}} logs --follow --pod-running-timeout=5m job/{{.JOB_NAME}}
    env:
      NS: '{{.NS}}'
      DEPLOYMENT: '{{.DEPLOYMENT}}'
      CONTAINER: '{{.CONTAINER}}'
      REGION: '{{.REGION}}'
      JOB_NAME: '{{.JOB_NAME}}'
      IMPORT_JOB_COMPONENT: '{{.IMPORT_JOB_COMPONENT}}'
      IMPORT_DEADLINE_SECONDS: '{{.IMPORT_DEADLINE_SECONDS}}'
      KUBECTL_IMAGE: '{{.KUBECTL_IMAGE}}'
      SERVICE_ACCOUNT: '{{.SERVICE_ACCOUNT}}'
    vars:
      REGION: '{{.REGION | default "next"}}'
      JOB_NAME:
        sh: |
          stamp="$(date +%Y%m%d-%H%M%S)"
          raw="nominatim-import-{{.REGION}}-${stamp}"
          printf '%s' "${raw}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-63 | sed 's/-$//'
      KUBECTL_IMAGE:
        sh: >-
          kubectl -n {{.NS}} get cronjob {{.CRONJOB}}
          -o jsonpath='{.spec.jobTemplate.spec.template.spec.containers[0].image}'
      SERVICE_ACCOUNT:
        sh: >-
          kubectl -n {{.NS}} get cronjob {{.CRONJOB}}
          -o jsonpath='{.spec.jobTemplate.spec.template.spec.serviceAccountName}'
      ACTIVE_IMPORT_JOBS:
        sh: >-
          kubectl -n {{.NS}} get jobs
          -l app.kubernetes.io/component={{.IMPORT_JOB_COMPONENT}}
          -o jsonpath='{range .items[?(@.status.active)]}{.metadata.name}{"\n"}{end}'
    preconditions:
      - test -f {{.RESOURCES_DIR}}/import-job.yaml.j2
      - kubectl -n {{.NS}} get deploy {{.DEPLOYMENT}}
      - kubectl -n {{.NS}} get cronjob {{.CRONJOB}}
      - sh: test -n "{{.KUBECTL_IMAGE}}" && test -n "{{.SERVICE_ACCOUNT}}"
        msg: Could not read image/serviceAccount from cronjob/{{.CRONJOB}}
      - sh: test -z "{{.ACTIVE_IMPORT_JOBS}}"
        msg: "An import Job is already active:{{.ACTIVE_IMPORT_JOBS}}"
      - which kubectl minijinja-cli

  update-incremental:
    desc: Trigger a one-off Job from the daily OSM update CronJob
    interactive: true
    cmds:
      - kubectl -n {{.NS}} create job --from=cronjob/{{.CRONJOB}} {{.JOB_NAME}}
      - kubectl -n {{.NS}} logs --follow --pod-running-timeout=5m job/{{.JOB_NAME}}
    vars:
      JOB_NAME:
        sh: echo "nominatim-update-$(date +%Y%m%d-%H%M%S)"
    preconditions:
      - kubectl -n {{.NS}} get cronjob {{.CRONJOB}}
      - which kubectl

  pg-source-status:
    desc: Read-only status for CNPG source-replication prep (Service, role, pg_hba, OSM cron)
    silent: true
    cmds:
      - "echo 'source_service: {{.SVC_STATUS}}'"
      - "echo 'wal_level: {{.WAL_LEVEL}}'"
      - "echo 'max_wal_senders: {{.MAX_WAL_SENDERS}}'"
      - "echo 'repl_role_exists: {{.ROLE_EXISTS}}'"
      - "echo 'pg_hba_repl_entry: {{.HBA_ENTRY}}'"
      - "echo 'osm_cronjob_suspended: {{.CRON_SUSPENDED}}'"
    vars:
      SVC_STATUS:
        sh: >-
          kubectl -n {{.NS}} get svc {{.PG_SOURCE_SVC}}
          -o jsonpath='{.spec.clusterIP} -> {.spec.ports[0].port}' 2>/dev/null || echo "(not found)"
      WAL_LEVEL:
        sh: '{{.KEXEC}} sudo -u postgres psql -At -c "SHOW wal_level;" 2>/dev/null || echo unknown'
      MAX_WAL_SENDERS:
        sh: '{{.KEXEC}} sudo -u postgres psql -At -c "SHOW max_wal_senders;" 2>/dev/null || echo unknown'
      ROLE_EXISTS:
        sh: >-
          {{.KEXEC}} sudo -u postgres psql -At
          -c "SELECT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '{{.REPL_ROLE}}');" 2>/dev/null || echo unknown
      HBA_ENTRY:
        sh: >-
          {{.KEXEC}} sh -c 'grep -F "{{.REPL_ROLE}}" "${PGDATA:-/var/lib/postgresql/16/main}/pg_hba.conf"' 2>/dev/null
          || echo "(none)"
      CRON_SUSPENDED:
        sh: >-
          kubectl -n {{.NS}} get cronjob {{.CRONJOB}}
          -o jsonpath='{.spec.suspend}' 2>/dev/null || echo unknown
    preconditions:
      - which kubectl

  setup-replication:
    desc: "One-off: create replication role + pg_hba entry on embedded Postgres (idempotent)"
    interactive: true
    prompt: This mutates the embedded Postgres in deploy/nominatim (role, pg_hba, reload). Continue?
    cmds:
      - >-
        kubectl -n {{.NS}} exec -i deploy/{{.DEPLOYMENT}} -c {{.CONTAINER}} --
        env REPL_USER={{.REPL_ROLE}} REPL_CIDR={{.REPL_CIDR}} REPL_PASSWORD="{{.REPL_PASSWORD}}"
        bash -s < {{.RESOURCES_DIR}}/setup-replication.sh
      - task: pg-source-status
    vars:
      REPL_PASSWORD:
        sh: kubectl -n {{.NS}} get secret {{.REPL_SECRET}} -o jsonpath='{.data.password}' | base64 -d
    preconditions:
      - which kubectl
      - kubectl -n {{.NS}} get secret {{.REPL_SECRET}}
      - kubectl -n {{.NS}} get deploy {{.DEPLOYMENT}}
      - test -f {{.RESOURCES_DIR}}/setup-replication.sh

  repl-preflight:
    desc: "One-off: verify replication connectivity to nominatim-pg-source from a throwaway pod"
    interactive: true
    cmds:
      - >-
        kubectl -n {{.NS}} run nominatim-repl-preflight --rm -i --restart=Never
        --image=ghcr.io/cloudnative-pg/postgresql:16
        --env=PGPASSWORD="{{.REPL_PASSWORD}}" --command --
        bash -c 'pg_isready -h {{.PG_SOURCE_SVC}}.{{.NS}}.svc -p 5432 -U {{.REPL_ROLE}}
        && psql "host={{.PG_SOURCE_SVC}}.{{.NS}}.svc user={{.REPL_ROLE}} dbname=postgres replication=database"
        -c "IDENTIFY_SYSTEM;"'
    vars:
      REPL_PASSWORD:
        sh: kubectl -n {{.NS}} get secret {{.REPL_SECRET}} -o jsonpath='{.data.password}' | base64 -d
    preconditions:
      - which kubectl
      - kubectl -n {{.NS}} get secret {{.REPL_SECRET}}
      - kubectl -n {{.NS}} get svc {{.PG_SOURCE_SVC}}

  repl-lag:
    desc: Show streaming replication lag from the embedded Postgres (read-only)
    silent: true
    cmds:
      - >-
        {{.KEXEC}} sudo -u postgres psql -At -F': '
        -c "SELECT application_name, state, sync_state,
        pg_size_pretty(pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn)) AS replay_lag
        FROM pg_stat_replication;"
    preconditions:
      - which kubectl

  cnpg-status:
    desc: Read-only CNPG nominatim-db phase, instances, and ScheduledBackup status
    silent: true
    cmds:
      - "echo 'cluster: {{.CLUSTER_STATUS}}'"
      - "echo 'replica_enabled: {{.REPLICA_ENABLED}}'"
      - "echo 'instances: {{.INSTANCES}}'"
      - "echo 'scheduled_backup: {{.SBACKUP}}'"
      - "echo 'cutover_runbook: docs/runbooks/nominatim-cnpg-cutover.md'"
    vars:
      CLUSTER_STATUS:
        sh: >-
          kubectl -n {{.NS}} get cluster.postgresql.cnpg.io nominatim-db
          -o jsonpath='{.status.phase}' 2>/dev/null || echo "(not found)"
      REPLICA_ENABLED:
        sh: >-
          kubectl -n {{.NS}} get cluster.postgresql.cnpg.io nominatim-db
          -o jsonpath='{.spec.replica.enabled}' 2>/dev/null || echo "(not found)"
      INSTANCES:
        sh: >-
          kubectl -n {{.NS}} get pods -l cnpg.io/cluster=nominatim-db
          -o wide 2>/dev/null || echo "(none)"
      SBACKUP:
        sh: >-
          kubectl -n {{.NS}} get scheduledbackup.postgresql.cnpg.io nominatim-db
          -o jsonpath='schedule={.spec.schedule} immediate={.spec.immediate} method={.spec.method}' 2>/dev/null
          || echo "(not found)"
    preconditions:
      - which kubectl

  cutover-scale-down:
    desc: "Cutover: suspend Flux HelmRelease and scale nominatim API to 0 (ops window)"
    interactive: true
    prompt: Suspend HelmRelease nominatim and scale the API to 0 replicas?
    cmds:
      - flux suspend helmrelease {{.DEPLOYMENT}} -n {{.NS}}
      - kubectl -n {{.NS}} scale deploy/{{.DEPLOYMENT}} --replicas=0
      - kubectl -n {{.NS}} rollout status deploy/{{.DEPLOYMENT}} --timeout=5m
    preconditions:
      - which kubectl flux
      - kubectl -n {{.NS}} get deploy {{.DEPLOYMENT}}

  cutover-scale-up:
    desc: "Cutover: scale nominatim API back to 1 and resume Flux HelmRelease"
    cmds:
      - kubectl -n {{.NS}} scale deploy/{{.DEPLOYMENT}} --replicas=1
      - flux resume helmrelease {{.DEPLOYMENT}} -n {{.NS}}
    preconditions:
      - which kubectl flux

  cutover-help:
    desc: Print pointer to the CNPG cutover runbook (no cluster writes)
    silent: true
    cmds:
      - |
        cat <<'EOF'
        Follow docs/runbooks/nominatim-cnpg-cutover.md.

        One-off setup/cutover steps are local Taskfile executions:
          task nominatim:setup-replication   # role + pg_hba on embedded Postgres
          task nominatim:repl-preflight      # throwaway-pod connectivity check
          task nominatim:repl-lag            # streaming lag (read-only)
          task nominatim:cutover-scale-down  # suspend HR + scale API to 0
          task nominatim:cutover-scale-up    # scale back + resume HR

        Durable state stays in git for Flux: nominatim-db Cluster/ObjectStore/secrets,
        source Service, and the Phase D commit (promote replica.enabled: false, flip
        HelmRelease to start-external.sh + ExternalSecret DSN keys).

        This task performs no cluster writes.
        EOF
