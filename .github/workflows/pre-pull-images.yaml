---
name: Pre-pull Images

on:
  workflow_dispatch:
#  pull_request:
#    branches: ["main"]
#    paths: ["kubernetes/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Pre-pull Images - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@v0.6.0
        with:
          patterns: kubernetes/**/*

  extract-images:
    if: ${{ needs.filter.outputs.changed-files != '[]' || github.event_name == 'workflow_dispatch' }}
    needs: filter
    name: Extract Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.extract-images.outputs.images }}
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout Pull Request Branch
        uses: actions/checkout@v7
        with:
          token: "${{ steps.app-token.outputs.token }}"
          path: pull

      - name: Checkout Default Branch
        uses: actions/checkout@v7
        with:
          token: "${{ steps.app-token.outputs.token }}"
          ref: "${{ github.event.repository.default_branch }}"
          path: default

      - name: Gather Images
        uses: docker://ghcr.io/home-operations/flate:0.1.3
        with:
          args: >-
            diff images
            --path ./pull
            --path-orig ./default
            --output json
            --output-file images.json

      - name: Extract Images
        id: extract-images
        run: echo "images=$(jq --compact-output '.' images.json)" >> "$GITHUB_OUTPUT"

  pre-pull-images:
    if: ${{ needs.extract-images.outputs.images != '[]' }}
    name: Pre-pull Images
    runs-on: ["homelab-runner"]
    needs: [extract-images]
    strategy:
      matrix:
        images: ${{ fromJSON(needs.extract-images.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Setup Workflow Tools
        run: brew install siderolabs/tap/talosctl

      - name: Pre-pull Image
        run: talosctl --nodes $NODE image pull ${{ matrix.images }}

  pre-pull-images-success:
    if: ${{ always() }}
    needs: [pre-pull-images]
    name: Pre-pull Images Successful
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        name: Check matrix status
        run: exit 1
