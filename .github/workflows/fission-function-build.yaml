# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Build Fission Functions

on:
  push:
    branches: [main]
    paths:
      - kubernetes/apps/fission/functions/**/Dockerfile
      - kubernetes/apps/fission/functions/**/*.py
      - kubernetes/apps/fission/functions/**/pyproject.toml
      - kubernetes/apps/fission/functions/**/uv.lock
  pull_request:
    branches: [main]
    paths:
      - kubernetes/apps/fission/functions/**/Dockerfile
      - kubernetes/apps/fission/functions/**/*.py
      - kubernetes/apps/fission/functions/**/pyproject.toml
      - kubernetes/apps/fission/functions/**/uv.lock
  workflow_dispatch:
    inputs:
      function:
        description: Function to build (leave empty to build all with a Dockerfile)
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has_functions: ${{ steps.set.outputs.has_functions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine functions to build
        id: set
        run: |
          input="${{ inputs.function }}"
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          root="kubernetes/apps/fission/functions"
          if [ -n "$input" ]; then
            names=("$input")
          elif [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            readarray -t names < <(find "$root" -mindepth 2 -maxdepth 2 -name Dockerfile -printf '%h\n' | xargs -I{} basename {} | sort)
          else
            readarray -t names < <(
              git diff --name-only "$base" "${{ github.sha }}" -- "$root/" \
                | awk -F/ 'NF>=5 {print $5}' \
                | sort -u \
                | while read -r name; do
                    [ -f "$root/$name/Dockerfile" ] && echo "$name"
                  done
            )
          fi
          echo "matrix=$(jq -cn '{function: $ARGS.positional}' --args "${names[@]}")" >> "$GITHUB_OUTPUT"
          echo "has_functions=$([ ${#names[@]} -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.function }}
    needs: prepare
    if: needs.prepare.outputs.has_functions == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    permissions:
      contents: write
      packages: write
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/zebernst/fission-${{ matrix.function }}
          tags: |
            type=sha
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        id: build
        with:
          context: kubernetes/apps/fission/functions/${{ matrix.function }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=fission-${{ matrix.function }}
          cache-to: type=gha,mode=max,scope=fission-${{ matrix.function }}

      - name: Pin package digest in Git
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PKG: kubernetes/apps/fission/functions/${{ matrix.function }}/package.yaml
        run: |
          set -euo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "missing image digest from build" >&2
            exit 1
          fi
          case "$DIGEST" in
            sha256:*) ;;
            *) DIGEST="sha256:${DIGEST}" ;;
          esac
          current=$(yq -r '.spec.deployment.oci.digest // ""' "$PKG")
          if [ "$current" = "$DIGEST" ]; then
            echo "package digest already up to date"
            exit 0
          fi
          yq -i ".spec.deployment.oci.digest = \"$DIGEST\"" "$PKG"
          git config user.name "botty-white[bot]"
          git config user.email "181132496+botty-white[bot]@users.noreply.github.com"
          git add "$PKG"
          git commit -m "chore(fission): pin ${{ matrix.function }} package digest"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            git pull --rebase --autostash origin main
          done
          echo "failed to push digest pin after retries" >&2
          exit 1
