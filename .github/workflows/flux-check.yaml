---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@v0.6.0
        with:
          patterns: kubernetes/**/*

  test:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        resource: [helmrelease, kustomization]
      fail-fast: false
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout Pull Request Branch
        uses: actions/checkout@v6
        with:
          token: "${{ steps.app-token.outputs.token }}"
          path: pull

      - name: Checkout Default Branch
        uses: actions/checkout@v6
        with:
          token: "${{ steps.app-token.outputs.token }}"
          ref: "${{ github.event.repository.default_branch }}"
          path: default

      - name: Setup flate
        uses: home-operations/flate/action@v0.1.35
        with:
          cache: true
          token: "${{ steps.app-token.outputs.token }}"

      - name: Run flate test
        run: >-
          flate test ${{ matrix.resource }}
          --path ./pull
          --path-orig ./default

  diff:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Flate - Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource: [helmrelease, kustomization]
      fail-fast: false
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout Pull Request Branch
        uses: actions/checkout@v6
        with:
          token: "${{ steps.app-token.outputs.token }}"
          path: pull

      - name: Checkout Default Branch
        uses: actions/checkout@v6
        with:
          token: "${{ steps.app-token.outputs.token }}"
          ref: "${{ github.event.repository.default_branch }}"
          path: default

      - name: Setup flate
        uses: home-operations/flate/action@v0.1.35
        with:
          cache: true
          token: "${{ steps.app-token.outputs.token }}"

      - name: Run flate diff
        run: >-
          flate diff ${{ matrix.resource }}
          --path ./pull
          --path-orig ./default
          -o markdown
          > diff.patch

      - name: Generate Diff
        id: diff
        run: |
          if [ -s diff.patch ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "### Diff"
            echo '```diff'
            cat diff.patch
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo '```diff'
            head -c 500000 diff.patch
            if [ "$(wc -c < diff.patch)" -gt 500000 ]; then
              echo ""
              echo "... diff truncated for PR comment ($(wc -c < diff.patch) bytes total). See workflow run summary for full output."
            fi
            echo '```'
          } > diff-comment.md

      - if: ${{ steps.diff.outputs.has_diff == 'true' }}
        name: Add Comment
        uses: mshick/add-pr-comment@v3
        with:
          repo-token: "${{ steps.app-token.outputs.token }}"
          message-id: "${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}"
          message-failure: Diff was not successful
          message-path: diff-comment.md

  flate-success:
    needs: [filter, test, diff]
    if: ${{ always() }}
    name: Flate successful
    runs-on: ubuntu-latest
    steps:
      - name: Check flate status
        if: >-
          ${{ needs.filter.outputs.changed-files != '[]' &&
          (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
        run: exit 1
