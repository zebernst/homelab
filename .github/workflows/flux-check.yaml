---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flate

on:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  filter:
    if: ${{ github.event_name == 'pull_request' }}
    name: Flate - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@v0.6.0
        with:
          patterns: kubernetes/**/*

  test:
    needs: [filter]
    if: >-
      always() &&
      (
        needs.filter.result == 'skipped' ||
        needs.filter.outputs.changed-files != '[]'
      )
    name: Flate - Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        resource: [helmrelease, kustomization]
      fail-fast: false
    steps:
      - name: Generate Token
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
          token: ${{ github.event_name == 'pull_request' && steps.app-token.outputs.token || github.token }}

      - name: Setup flate
        uses: home-operations/flate/action@0.1.35
        with:
          # Empty base = full-tree reconcile. PR changed-only mode (--base main)
          # skips unchanged HelmRelease dependsOn targets, which surfaces as
          # "dependency not found" for charts like victoria-metrics and volsync.
          base: ""
          cache: true
          token: ${{ github.event_name == 'pull_request' && steps.app-token.outputs.token || github.token }}

      - name: Run flate test
        env:
          FLATE_BASE: ""
        run: >-
          flate test ${{ matrix.resource }}
          --path ./kubernetes
          --allow-missing-secrets

  diff:
    if: ${{ github.event_name == 'pull_request' && needs.filter.outputs.changed-files != '[]' }}
    needs: [filter]
    name: Flate - Diff
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource: [helmrelease, kustomization]
      fail-fast: false
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: "${{ steps.app-token.outputs.token }}"

      - name: Setup flate
        uses: home-operations/flate/action@0.1.35
        with:
          base: ""
          cache: true
          token: "${{ steps.app-token.outputs.token }}"

      - name: Run flate diff
        env:
          FLATE_BASE: ""
        run: |
          set -euo pipefail
          rc=0
          flate diff ${{ matrix.resource }} \
            --path ./kubernetes \
            --allow-missing-secrets \
            -o markdown \
            > diff.patch 2> diff.err || rc=$?
          if [[ "$rc" -eq 0 ]]; then
            exit 0
          fi
          if [[ -s diff.patch ]]; then
            cat diff.err >&2
            exit "$rc"
          fi
          # `flate diff` always materializes a merge-base baseline, so changed-only
          # mode still runs. HelmRelease dependsOn peers stay out of the keep set and
          # reconcile as "dependency not found" on both snapshots — exit 1 with no diff
          # output even when the PR is valid. Allow that specific failure mode.
          if grep -qF 'dependency not found' diff.err \
            && ! grep -E 'fetch https?://|artifact not found|chart not found' diff.err; then
            echo "::warning::Ignoring HelmRelease dependsOn failures in changed-only flate diff (upstream limitation)"
            exit 0
          fi
          cat diff.err >&2
          exit "$rc"

      - name: Generate Diff
        id: diff
        run: |
          if [ -s diff.patch ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "### Diff"
            echo '```diff'
            cat diff.patch
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          {
            echo '```diff'
            head -c 500000 diff.patch
            if [ "$(wc -c < diff.patch)" -gt 500000 ]; then
              echo ""
              echo "... diff truncated for PR comment ($(wc -c < diff.patch) bytes total). See workflow run summary for full output."
            fi
            echo '```'
          } > diff-comment.md

      - if: ${{ steps.diff.outputs.has_diff == 'true' }}
        name: Add Comment
        uses: mshick/add-pr-comment@v3
        with:
          repo-token: "${{ steps.app-token.outputs.token }}"
          message-id: "${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}"
          message-failure: Diff was not successful
          message-path: diff-comment.md

  flate-success:
    needs: [filter, test, diff]
    if: ${{ always() }}
    name: Flate successful
    runs-on: ubuntu-latest
    steps:
      - name: Check flate status
        if: >-
          (
            needs.filter.result == 'skipped' ||
            needs.filter.outputs.changed-files != '[]'
          ) &&
          (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled'))
        run: exit 1
