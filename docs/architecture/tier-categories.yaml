# Architecture layers — aligned with PriorityClass semantics and DR restore order.
#
# Layers are conceptual (not Flux dependsOn depth). Partitions group Kustomizations
# within a layer. First matching partition wins.

layers:
  substrate:
    label: Substrate
    description: Cluster-critical infrastructure the cluster cannot run without
    order: 0
  platform:
    label: Platform
    description: Shared services that workloads depend on
    order: 1
  data:
    label: Data
    description: Shared databases and cache clusters
    order: 2
  ai:
    label: AI
    description: Shared inference infrastructure
    order: 3
  workloads:
    label: Workloads
    description: User-facing applications
    order: 4
    collapse_by_namespace: true

# Kustomizations to render explicitly (non-workload layers). Others collapse into
# namespace workload groups unless load-bearing (>= 5 direct dependents).
always_show:
  - flux-system/cluster-meta
  - flux-system/cluster-apps
  - flux-system/flux-operator
  - kube-system/cilium
  - kube-system/snapshot-controller
  - external-secrets/external-secrets
  - external-secrets/onepassword
  - external-secrets/cluster-secrets
  - cert-manager/cert-manager
  - cert-manager/cert-manager-issuers
  - rook-ceph/rook-ceph
  - rook-ceph/rook-ceph-cluster
  - volsync-system/volsync
  - database/cloudnative-pg
  - database/cloudnative-pg-cluster
  - database/dragonfly-cluster
  - observability/victoria-metrics-operator
  - observability/victoria-metrics
  - network/ingress-nginx-external
  - network/ingress-nginx-internal
  - auth/pocket-id
  - ai/ollama

partitions:
  - id: substrate/cluster
    layer: substrate
    label: cluster
    match:
      nodes:
        - kube-system/cilium
        - kube-system/coredns
        - kube-system/metrics-server
        - kube-system/snapshot-controller
        - kube-system/node-feature-discovery
        - kube-system/reloader
        - kube-system/spegel
        - kube-system/kubelet-csr-approver

  - id: substrate/gitops
    layer: substrate
    label: gitops
    match:
      nodes:
        - flux-system/cluster-meta

  - id: platform/gitops
    layer: platform
    label: gitops
    match:
      namespaces: [flux-system]
      exclude_nodes:
        - flux-system/cluster-meta

  - id: platform/secrets
    layer: platform
    label: secrets
    match:
      namespaces: [external-secrets]

  - id: platform/security
    layer: platform
    label: security
    match:
      namespaces: [cert-manager]

  - id: platform/networking
    layer: platform
    label: networking
    match:
      namespaces: [network]
      nodes:
        - kube-system/cilium-config
        - kube-system/cilium-gateway
        - kube-system/synology-csi-driver

  - id: platform/auth
    layer: platform
    label: auth
    match:
      namespaces: [auth]

  - id: platform/observability
    layer: platform
    label: observability
    match:
      namespaces: [observability]

  - id: platform/storage
    layer: platform
    label: storage
    match:
      namespaces: [rook-ceph, volsync-system, openebs-system]

  - id: platform/data-operators
    layer: platform
    label: data operators
    match:
      nodes:
        - database/cloudnative-pg
        - database/dragonfly

  - id: data/postgres
    layer: data
    label: postgres
    match:
      nodes:
        - database/cloudnative-pg-cluster
        - database/mariadb

  - id: data/cache
    layer: data
    label: cache
    match:
      nodes:
        - database/dragonfly-cluster

  - id: ai/inference
    layer: ai
    label: inference
    match:
      nodes:
        - ai/ollama

  - id: workloads
    layer: workloads
    label: applications
    default: true
