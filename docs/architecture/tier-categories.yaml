# Architecture model for the generated Mermaid diagram.
#
# vertical_tiers  — chart position (bottom to top). Multiple groups can share a tier.
# groups          — conceptual classification (platform vs observability, data vs AI).
# partitions      — subdivisions within a group. First matching partition wins.

vertical_tiers:
  0:
    label: Substrate
    description: Cluster-critical infrastructure and storage the cluster cannot run without
    groups: [substrate]
  1:
    label: Infrastructure
    description: Platform providers and observability at the same tier, distinct groups
    groups: [platform, observability]
  2:
    label: Shared services
    description: Data and AI at the same tier, distinct groups
    groups: [data, ai]
  3:
    label: Workloads
    description: User-facing applications
    groups: [workloads]

groups:
  substrate:
    label: Substrate
    description: CNI, core cluster services, block/file storage, backup
  platform:
    label: Platform
    description: Secrets, networking, auth, security, gitops
  observability:
    label: Observability
    description: Metrics, logs, alerting, synthetic checks — not an infra provider
  data:
    label: Data
    description: Shared databases and cache clusters
  ai:
    label: AI
    description: Shared inference infrastructure
  workloads:
    label: Workloads
    collapse_by_namespace: true

always_show:
  - flux-system/cluster-meta
  - flux-system/cluster-apps
  - flux-system/flux-operator
  - kube-system/cilium
  - kube-system/snapshot-controller
  - external-secrets/external-secrets
  - external-secrets/onepassword
  - external-secrets/cluster-secrets
  - cert-manager/cert-manager
  - cert-manager/cert-manager-issuers
  - rook-ceph/rook-ceph
  - rook-ceph/rook-ceph-cluster
  - volsync-system/volsync
  - database/cloudnative-pg
  - database/cloudnative-pg-cluster
  - database/dragonfly-cluster
  - observability/victoria-metrics-operator
  - observability/victoria-metrics
  - network/ingress-nginx-external
  - network/ingress-nginx-internal
  - auth/pocket-id
  - ai/ollama

partitions:
  - id: substrate/cluster
    group: substrate
    label: cluster
    match:
      nodes:
        - kube-system/cilium
        - kube-system/coredns
        - kube-system/metrics-server
        - kube-system/snapshot-controller
        - kube-system/node-feature-discovery
        - kube-system/reloader
        - kube-system/spegel
        - kube-system/kubelet-csr-approver

  - id: substrate/gitops
    group: substrate
    label: gitops
    match:
      nodes:
        - flux-system/cluster-meta

  - id: substrate/storage
    group: substrate
    label: storage
    match:
      namespaces: [rook-ceph, volsync-system, openebs-system]
      nodes:
        - kube-system/synology-csi-driver

  - id: platform/gitops
    group: platform
    label: gitops
    match:
      namespaces: [flux-system]
      exclude_nodes:
        - flux-system/cluster-meta

  - id: platform/secrets
    group: platform
    label: secrets
    match:
      namespaces: [external-secrets]

  - id: platform/security
    group: platform
    label: security
    match:
      namespaces: [cert-manager]

  - id: platform/networking
    group: platform
    label: networking
    match:
      namespaces: [network]
      nodes:
        - kube-system/cilium-config
        - kube-system/cilium-gateway

  - id: platform/auth
    group: platform
    label: auth
    match:
      namespaces: [auth]

  - id: platform/data-operators
    group: platform
    label: data operators
    match:
      nodes:
        - database/cloudnative-pg
        - database/dragonfly

  - id: observability/metrics
    group: observability
    label: metrics
    match:
      nodes:
        - observability/victoria-metrics-operator
        - observability/victoria-metrics
        - observability/victoria-logs
        - observability/vmalert

  - id: observability/checks
    group: observability
    label: checks
    match:
      nodes:
        - observability/gatus
        - observability/blackbox-exporter
        - observability/kromgo

  - id: observability/other
    group: observability
    label: other
    match:
      namespaces: [observability]

  - id: data/postgres
    group: data
    label: postgres
    match:
      nodes:
        - database/cloudnative-pg-cluster
        - database/mariadb

  - id: data/cache
    group: data
    label: cache
    match:
      nodes:
        - database/dragonfly-cluster

  - id: ai/inference
    group: ai
    label: inference
    match:
      nodes:
        - ai/ollama

  - id: workloads
    group: workloads
    label: applications
    default: true
