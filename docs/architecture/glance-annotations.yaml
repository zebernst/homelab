# Canonical glance-k8s annotation registry for homelab workloads.
# Categories align with Glance Homelab page widgets (namespace-oriented UX).

categories:
  - media
  - downloads
  - self-hosted
  - ai
  - auth
  - games
  - observability

multi_route:
  - auth/pocket-id
  - ai/ollama
  - downloads/qui
  - media/tautulli
  - media/plex
  - self-hosted/mealie
  - observability/victoria-metrics

