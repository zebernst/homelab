---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# Default alert `job` from VMRule metadata.name on every rule group.
#
# Injected cluster-wide via kubernetes/flux/cluster/ks.yaml on all Flux Kustomizations.
# ignoreMissingComponents skips component paths that do not resolve for a given spec.path
# depth (see ../../../ vs ../../../../ vs ../../../../../ entries there).
#
# Overrides (replacements overwrite existing group labels.job):
# - Per-VMRule job: set metadata.name to the desired job (e.g. volsync-metrics).
# - Per-group job: strategic-merge patch under patches: in the app kustomization.
# - Per-rule job: labels.job on individual rules (not touched by this component).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
replacements:
  - source:
      group: operator.victoriametrics.com
      version: v1beta1
      kind: VMRule
      fieldPath: metadata.name
    targets:
      - select:
          group: operator.victoriametrics.com
          version: v1beta1
          kind: VMRule
        fieldPaths:
          - spec.groups.*.labels.job
        options:
          create: true
