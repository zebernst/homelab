---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# Sets alert `job` from each VMRule's metadata.name (matches app.kubernetes.io/name in practice).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
replacements:
  - source:
      group: operator.victoriametrics.com
      version: v1beta1
      kind: VMRule
      fieldPath: metadata.name
    targets:
      - select:
          group: operator.victoriametrics.com
          version: v1beta1
          kind: VMRule
        fieldPaths:
          - spec.groups.*.labels.job
        options:
          create: true
