---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# Default alert `job` from VMRule metadata.name on every rule group.
#
# Wired per app in that app's Flux Kustomization (`spec.components`), not cluster-wide.
# `ignoreMissingComponents` only skips missing component *paths*; it does not detect
# whether a build contains VMRules. Apps without vmrule.yaml must not list this component.
#
# Component path depth (relative to `spec.path`):
#   repeat `../` (segment count of spec.path minus 1) + `components/vmrule`
# Examples:
#   kubernetes/apps/ai/holmesgpt/app              -> ../../../../components/vmrule
#   kubernetes/apps/downloads/sonarr/app/hd       -> ../../../../../components/vmrule
#
# Overrides (replacements overwrite existing group `labels.job`; cannot "fill only if empty"):
# - Per-VMRule job: set metadata.name to the job you want (e.g. volsync-metrics, flux).
# - Per-group job: strategic-merge patch under `patches:` in the app kustomization.
# - Per-rule job: labels.job on individual rules (not touched by this component; vmalert
#   prefers rule labels over group labels).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
replacements:
  - source:
      group: operator.victoriametrics.com
      version: v1beta1
      kind: VMRule
      fieldPath: metadata.name
    targets:
      - select:
          group: operator.victoriametrics.com
          version: v1beta1
          kind: VMRule
        fieldPaths:
          - spec.groups.*.labels.job
        options:
          create: true
