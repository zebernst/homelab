---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
# Patches victoria-metrics HelmRelease defaultRules so alerts do not inherit job=kube-state-metrics
# from series labels. Uses vmalert label templating (no per-rule duplication in git).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - path: default-rules-alert-labels.patch.yaml
    target:
      group: helm.toolkit.fluxcd.io
      version: v2
      kind: HelmRelease
      name: victoria-metrics
