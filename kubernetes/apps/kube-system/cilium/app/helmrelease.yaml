# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: 1.19.1
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: cilium-helm-values

  values:
    hubble:
      enabled: true
      tls:
        auto:
          # "helm" (chart default) only generates certs once at install time and
          # never renews them — Flux's periodic HelmRelease reconciles are no-ops
          # against an unchanged chart, so the certs silently expire after
          # certValidityDuration with no automatic recovery. "cronJob" adds an
          # in-cluster CronJob that periodically regenerates certs before they
          # expire, independent of whether Flux ever runs another helm upgrade.
          method: cronJob
          certValidityDuration: 365
          schedule: "0 0 1 */2 *"
      metrics:
        enabled:
          - dns:query
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - http
        serviceMonitor:
          enabled: true
      relay:
        enabled: true
        rollOutPods: true
        prometheus:
          serviceMonitor:
            enabled: true
      ui:
        enabled: true
        rollOutPods: true
        ingress:
          className: tailscale
          hosts: [&host "{{ .Release.Name }}.kite-harmonic.ts.net"]
          tls:
            - hosts: [*host]
    operator:
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
