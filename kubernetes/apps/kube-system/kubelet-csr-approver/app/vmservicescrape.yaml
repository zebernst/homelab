---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmservicescrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: kubelet-csr-approver
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kubelet-csr-approver
      app.kubernetes.io/instance: kubelet-csr-approver
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1m
