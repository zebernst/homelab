---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: external-dns-unifi
spec:
  groups:
    - name: external-dns-unifi.rules
      rules:
        - alert: ExternalDNSUnifiStale
          expr: |
            time() - external_dns_controller_last_sync_timestamp_seconds{job="external-dns-unifi"} > 60
          for: 5m
          keep_firing_for: 90s
          annotations:
            summary: >-
              ExternalDNS ({{ $labels.job }}) has not synced successfully in the last five minutes
          labels:
            severity: critical
