---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: external-dns-cloudflare
spec:
  groups:
    - name: external-dns-cloudflare.rules
      labels:
        job: external-dns-cloudflare
      rules:
        - alert: ExternalDNSCloudflareStale
          expr: |
            time() - external_dns_controller_last_sync_timestamp_seconds{job="external-dns-cloudflare"} > 60
          for: 5m
          annotations:
            summary: >-
              ExternalDNS ({{ $labels.job }}) has not synced successfully in the last five minutes
          labels:
            severity: critical
