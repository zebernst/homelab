---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maddy-configmap
data:
  maddy.conf: |
    ## Maddy — outbound-only SMTP relay via Fastmail

    hostname {env:HOSTNAME}
    state_dir /var/lib/maddy

    tls off

    ## Prometheus metrics
    openmetrics tcp://0.0.0.0:9749 { }

    ## Accept mail from cluster pods — no auth required (ClusterIP only)
    smtp tcp://0.0.0.0:25 {
        deliver_to &remote_queue
    }

    submission tcp://0.0.0.0:587 {
        deliver_to &remote_queue
    }

    target.queue remote_queue {
        target &remote_smtp
    }

    ## Relay outbound mail through Fastmail
    target.smtp remote_smtp {
        targets tcp://smtp.fastmail.com:587
        starttls yes
        auth plain {env:SMTP_USER} {env:SMTP_PASS}
    }
