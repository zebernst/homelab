# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: maddy
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: maddy-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SMTP_USER: "{{ .SMTP_USER }}"
        SMTP_PASS: "{{ .SMTP_PASS }}"
  dataFrom:
    - extract:
        key: maddy
