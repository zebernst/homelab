# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: holmesgpt
spec:
  interval: 1h
  chart:
    spec:
      chart: holmes
      version: 0.30.0
      sourceRef:
        kind: HelmRepository
        name: holmesgpt
        namespace: flux-system

  values:
    # qwen3:8b is the best tool-calling model available locally
    additionalEnvVars:
      - name: OLLAMA_API_BASE
        value: "http://ollama.ai.svc.cluster.local:11434"
      - name: MODEL
        value: "ollama_chat/qwen3:8b"
      - name: ALERTMANAGER_URL
        value: "http://alertmanager-operated.observability.svc.cluster.local:9093"

    k8sRBAC: true

    crdPermissions:
      flux: true
      keda: true
      gatewayApi: true
      externalSecrets: true
      argo: false
      kafka: false
      crossplane: false
      istio: false
      velero: false

    toolsets:
      kubernetes/core:
        enabled: true
      kubernetes/logs:
        enabled: true
      prometheus/metrics:
        enabled: true
        config:
          prometheus_url: "http://prometheus-operated.observability.svc.cluster.local:9090"
          subtype: prometheus
      victorialogs:
        enabled: true
        config:
          api_url: "http://victoria-logs-server.observability.svc.cluster.local:9428"
      cilium/core:
        enabled: true
      hubble/observability:
        enabled: true
      connectivity_check:
        enabled: true
      bash:
        enabled: true
        config:
          builtin_allowlist: "extended"
      skills:
        enabled: true
      robusta:
        enabled: false
      internet:
        enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        memory: 2Gi

    operator:
      enabled: true
      logLevel: INFO
      maxHistoryItems: 10
      cleanupCompletedChecks: true
      completedCheckTTLHours: 24

    mcpAddons:
      github:
        enabled: true
        auth:
          githubApp:
            secretName: holmesgpt-github-app
        config:
          # Restrict to the minimum tools needed for PR proposals — no issue/action access
          tools: "get_file_contents,create_branch,create_or_update_file,create_pull_request,list_commits,get_me,get_pull_request"
        networkPolicy:
          enabled: true
