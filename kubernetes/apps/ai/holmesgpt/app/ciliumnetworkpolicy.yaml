# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
---
# Holmes server + operator: cluster-internal only, no internet.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: holmesgpt
spec:
  endpointSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - holmes
          - holmes-operator
  egress:
    # DNS
    - toServices:
        - k8sService:
            serviceName: kube-dns
            namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Kubernetes API server
    - toEntities:
        - kube-apiserver
    # Ollama LLM backend
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # VictoriaMetrics
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: vmsingle
      toPorts:
        - ports:
            - port: "8428"
              protocol: TCP
    # Alertmanager
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: vmalertmanager
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    # Victoria Logs
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: victoria-logs-single
      toPorts:
        - ports:
            - port: "9428"
              protocol: TCP
    # GitHub MCP server (in-namespace, chart-managed port 8000)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: github-mcp-server
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
# GitHub MCP server: only allowed to reach api.github.com.
# All other internet egress is denied.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: holmesgpt-github-mcp
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: github-mcp-server
  egress:
    # DNS (required to resolve api.github.com)
    - toServices:
        - k8sService:
            serviceName: kube-dns
            namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # GitHub API — named egress, no general internet
    - toFQDNs:
        - matchName: "api.github.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
