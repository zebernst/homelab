# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
---
# Holmes core pod (server + operator): cluster-internal only, no internet.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: holmesgpt
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: holmes
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Kubernetes API server
    - toEntities:
        - kube-apiserver
    # Ollama LLM backend
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # Prometheus
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # AlertManager
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: alertmanager
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    # Victoria Logs
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: observability
            app.kubernetes.io/name: victoria-logs-single
      toPorts:
        - ports:
            - port: "9428"
              protocol: TCP
    # GitHub MCP server (separate pod in ai namespace)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/name: github-mcp-server
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
# GitHub MCP server: only allowed to reach api.github.com.
# All other internet egress is denied.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: holmesgpt-github-mcp
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: github-mcp-server
  egress:
    # DNS (required to resolve api.github.com)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # GitHub API — named egress, no general internet
    - toFQDNs:
        - matchName: "api.github.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
