# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app mc-router
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    serviceAccount:
      mc-router:
        enabled: true
    rbac:
      roles:
        mc-router:
          type: ClusterRole
          rules:
            - apiGroups: [ "" ]
              resources: [ "services" ]
              verbs: [ "watch", "list" ]
            - apiGroups: [ "apps" ]
              resources: [ "statefulsets", "statefulsets/scale" ]
              verbs: [ "watch", "list", "get", "update", "patch" ]
      bindings:
        mc-router:
          type: ClusterRoleBinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            identifier: *app
          subjects:
            - identifier: *app
    defaultPodOptions:
      priorityClassName: best-effort
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      mc-router:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          mc-router:
            image:
              repository: ghcr.io/itzg/mc-router
              tag: 1.40.3@sha256:10881cb6b74ebf8957d309f29952ea677eccd1b474d1e106466c94e8890b0788
            env:
              TZ: America/Chicago
              IN_KUBE_CLUSTER: "true"
              API_BINDING: ":8080"
              PORT: &port 25565
              CONNECTION_RATE_LIMIT: 10
              METRICS_BACKEND: prometheus
              SIMPLIFY_SRV: true
              USE_PROXY_PROTOCOL: false
              RECORD_LOGINS: true
              AUTO_SCALE_UP: "true"
              AUTO_SCALE_DOWN: "true"
              AUTO_SCALE_DOWN_AFTER: "2h"
              AUTO_SCALE_ASLEEP_MOTD: "Server is sleeping. Connecting will wake it -- please wait a few minutes."
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 350m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 96Mi
        serviceAccount:
          identifier: *app
    service:
      mc-router:
        controller: *app
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.20.65
        ports:
          java:
            port: *port
          api:
            port: 8080
    ingress:
      mc-router:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
          external-dns.alpha.kubernetes.io/target: ipv4.zebernst.dev
        hosts:
          - host: "minecraft.zebernst.dev"
            paths:
              - path: /
                service:
                  identifier: *app
                  port: java
    route:
      api:
        kind: HTTPRoute
        hostnames: ["mc-api.zebernst.dev"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: 8080
    serviceMonitor:
      mc-router:
        serviceName: *app
        endpoints:
          - port: api
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s
