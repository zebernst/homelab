# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vanilla
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      *app:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          *app:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.2.1-java21
            env:
              EULA: "true"
              TZ: America/Chicago
              TYPE: "VANILLA"
              VERSION: "LATEST"
              ICON: https://media.forgecdn.net/avatars/thumbnails/1382/76/64/64/638896474054932351.png
              MOTD: |
                A Minecraft server on %VERSION%.
                §oHosted on §dJupiter§r
              SERVER_NAME: *app
              DIFFICULTY: normal
              ALLOW_FLIGHT: true
              ENFORCE_WHITELIST: "true"
              EXISTING_WHITELIST_FILE: SYNCHRONIZE
              WHITELIST: |
                zebernst
                Snorlocke
                Travler34__
              OPS: |
                zebernst
              PAUSE_WHEN_EMPTY_SECONDS: "60"
              INIT_MEMORY: 1G
              MAX_MEMORY: &max-memory 4G
            envFrom:
              - secretRef:
                  name: vanilla-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  periodSeconds: 15
                  exec: &probeexec { command: [ "mc-health" ] }
              readiness: *probe
              startup:
                <<: *probe
                spec:
                  initialDelaySeconds: 10
                  periodSeconds: 1
                  failureThreshold: 60
                  exec: *probeexec
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 1
                memory: *max-memory
          mc-monitor:
            image:
              repository: itzg/mc-monitor
              tag: 0.16.1@sha256:e8847581e7af9e5a3993f1a3cbb5bff0823435e38edcb382049c91de1a83edba
            args: ["export-for-prometheus"]
            env:
              EXPORT_SERVERS: vanilla
              DEBUG: "false"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
      bluemap:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            command: ["sh", "-c"]
            args:
              - |
                cp /configs-source/*.conf /app/config/
                mkdir -p /app/config/maps
                cp /maps-source/*.conf /app/config/maps/
        containers:
          bluemap:
            image:
              repository: ghcr.io/bluemap-minecraft/bluemap
              tag: v5.13
            args: ["-r", "-u", "-w"]
            env:
              JAVA_TOOL_OPTIONS: "-Xmx1G"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1536Mi

    defaultPodOptions:
      priorityClassName: best-effort
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    service:
      *app:
        controller: *app
        annotations:
          mc-router.itzg.me/defaultServer: "true"
          mc-router.itzg.me/autoScaleUp: "true"
          mc-router.itzg.me/autoScaleDown: "false"
        ports:
          game:
            port: 25565
          metrics:
            port: 8080
      rcon:
        controller: *app
        type: LoadBalancer
        loadBalancerClass: tailscale
        annotations:
          tailscale.com/hostname: vanilla-rcon
        ports:
          rcon:
            port: 25578

    persistence:
      tmp:
        type: emptyDir
        advancedMounts:
          *app:
            *app:
              - path: /tmp
      data:
        existingClaim: *app
        advancedMounts:
          *app:
            *app:
              - path: /data
          bluemap:
            bluemap:
              - path: /worlds/world
                subPath: world
                readOnly: true
      bluemap-shared:
        existingClaim: bluemap-shared
        advancedMounts:
          bluemap:
            bluemap:
              - path: /app/web
      bluemap-configs-source:
        type: configMap
        name: vanilla-bluemap-configs
        advancedMounts:
          bluemap:
            init-config:
              - path: /configs-source
                readOnly: true
      bluemap-maps-source:
        type: configMap
        name: vanilla-bluemap-maps
        advancedMounts:
          bluemap:
            init-config:
              - path: /maps-source
                readOnly: true
      bluemap-config:
        type: emptyDir
        advancedMounts:
          bluemap:
            init-config:
              - path: /app/config
            bluemap:
              - path: /app/config
      bluemap-tmp:
        type: emptyDir
        advancedMounts:
          bluemap:
            bluemap:
              - path: /tmp

    serviceMonitor:
      *app:
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s
