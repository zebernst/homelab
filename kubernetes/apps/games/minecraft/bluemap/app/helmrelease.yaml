# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app bluemap
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      *app:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            command: ["sh", "-c"]
            args:
              - |
                cp /configs-source/*.conf /app/config/
                cp /settings-source/settings.json /app/web/settings.json
        containers:
          *app:
            image:
              repository: ghcr.io/bluemap-minecraft/bluemap
              tag: v5.13
            args: ["-w", "-g"]
            env:
              JAVA_TOOL_OPTIONS: "-Xmx1G"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8100
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8100
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1536Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    service:
      *app:
        controller: *app
        ports:
          http:
            port: &port 8100

    route:
      external:
        hostnames: ["worldmap.zebernst.dev"]
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      web:
        existingClaim: bluemap-shared
        advancedMounts:
          *app:
            init-config:
              - path: /app/web
            *app:
              - path: /app/web
      configs-source:
        type: configMap
        name: bluemap-configs
        advancedMounts:
          *app:
            init-config:
              - path: /configs-source
                readOnly: true
      settings-source:
        type: configMap
        name: bluemap-settings
        advancedMounts:
          *app:
            init-config:
              - path: /settings-source
                readOnly: true
      config:
        type: emptyDir
        advancedMounts:
          *app:
            init-config:
              - path: /app/config
            *app:
              - path: /app/config
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
