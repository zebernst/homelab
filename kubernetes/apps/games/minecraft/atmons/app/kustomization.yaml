# yaml-language-server: $schema=https://json.schemastore.org/kustomization
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - dnsendpoint.yaml
  - externalsecret.yaml
  - helmrelease.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: atmons-bluemap-config
    files:
      - bluemap/core.conf
      - bluemap/webapp.conf
      - bluemap/webserver.conf
  - name: atmons-bluemap-maps
    files:
      - bluemap/maps/overworld.conf
      - bluemap/maps/nether.conf
      - bluemap/maps/end.conf
  - name: atmons-gatus-ep
    files:
      - config.yaml=gatus-config.yaml
    options:
      labels:
        gatus.io/enabled: "true"
