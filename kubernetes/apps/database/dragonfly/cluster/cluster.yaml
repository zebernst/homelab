---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: &cluster hindwing
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0
  replicas: 3
  # Restricts admin :9999 to operator + peer pods (operator default since 1.6)
  networkPolicyEnabled: true
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
    - --lock_on_hashtags
    # Bull/BullMQ (NocoDB) without hashtag prefixes
    - --default_lua_flags=allow-undeclared-keys
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  resources:
    requests:
      cpu: 100m
    limits:
      memory: 512Mi
#  snapshot:
#    dir: s3://
  serviceSpec:
    type: LoadBalancer
    annotations:
      external-dns.alpha.kubernetes.io/hostname: redis.internal
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app: *cluster
