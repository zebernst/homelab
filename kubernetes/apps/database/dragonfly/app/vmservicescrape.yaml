---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmservicescrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: dragonfly-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dragonfly-operator
      app.kubernetes.io/instance: dragonfly-operator
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1m
      scrapeTimeout: 10s
