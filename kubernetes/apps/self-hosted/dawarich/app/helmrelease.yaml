# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dawarich
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      dawarich:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          web:
            image:
              repository: freikin/dawarich
              tag: "1.7.5"
            command: ["web-entrypoint.sh"]
            args:
              - bin/rails
              - server
              - -p
              - "3000"
              - -b
              - "::"
            env:
              RAILS_ENV: production
              RAILS_LOG_TO_STDOUT: "true"
              RAILS_SERVE_STATIC_FILES: "true"
              APPLICATION_HOSTS: "timeline.zebernst.dev,localhost,127.0.0.1"
              APPLICATION_PROTOCOL: https
              TIME_ZONE: America/Chicago
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"
              PROMETHEUS_EXPORTER_ENABLED: "true"
              PROMETHEUS_EXPORTER_HOST: "0.0.0.0"
              PROMETHEUS_EXPORTER_PORT: &metricsPort "9394"
              OIDC_ISSUER: https://id.zebernst.dev
              OIDC_PROVIDER_NAME: Pocket ID
              OIDC_REDIRECT_URI: https://timeline.zebernst.dev/users/auth/openid_connect/callback
              OIDC_AUTO_REGISTER: "true"
              ALLOW_EMAIL_PASSWORD_REGISTRATION: "false"
              SMTP_SERVER: smtp-relay.network.svc.cluster.local
              SMTP_PORT: "25"
              SMTP_DOMAIN: zebernst.dev
              SMTP_FROM: noreply@zebernst.dev
              SMTP_STARTTLS: "false"
              PHOTON_API_HOST: photon.self-hosted.svc.cluster.local
              PHOTON_API_USE_HTTPS: "false"
            envFrom: &envFrom
              - secretRef:
                  name: dawarich-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: localhost
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /up
                    port: 3000
                    httpHeaders:
                      - name: Host
                        value: localhost
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1Gi
          sidekiq:
            image:
              repository: freikin/dawarich
              tag: "1.7.5"
            command: ["sidekiq-entrypoint.sh"]
            args: ["sidekiq"]
            env:
              RAILS_ENV: production
              RAILS_LOG_TO_STDOUT: "true"
              SELF_HOSTED: "true"
              STORE_GEODATA: "true"
              BACKGROUND_PROCESSING_CONCURRENCY: "5"
              PROMETHEUS_EXPORTER_ENABLED: "true"
              PROMETHEUS_EXPORTER_HOST: "127.0.0.1"
              PROMETHEUS_EXPORTER_PORT: *metricsPort
            envFrom: *envFrom
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          redis:
            image:
              repository: docker.io/redis
              tag: "7.4-alpine"
            command: ["redis-server", "--save", "", "--loglevel", "warning"]
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi

    defaultPodOptions:
      priorityClassName: internal-only
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    service:
      dawarich:
        controller: *app
        ports:
          http:
            port: 3000
          metrics:
            port: 9394

    route:
      app:
        hostnames:
          - timeline.zebernst.dev
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: 3000

    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /var/app/storage
            subPath: storage
          - path: /var/app/tmp/imports/watched
            subPath: watched
      public:
        type: emptyDir
        globalMounts:
          - path: /var/app/public
