# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: dawarich
spec:
  groups:
    - name: dawarich.rules
      rules:
        - alert: DawarichLocationSyncStale
          expr: |
            increase(rails_requests_total{controller="api/v1/points", action="create"}[25h]) == 0
          for: 15m
          annotations:
            summary: Dawarich location sync stopped
            description: >-
              No new location data has been received by Dawarich in over 24 hours.
              The iPhone app may have stopped syncing — check the app and its configuration.
          labels:
            severity: warning
            job: dawarich
