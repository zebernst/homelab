# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nominatim
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    serviceAccount:
      app:
        enabled: true
      maintenance:
        enabled: true
    rbac:
      roles:
        maintenance:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
      bindings:
        maintenance:
          type: RoleBinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            identifier: maintenance
          subjects:
            - identifier: maintenance
    controllers:
      nominatim:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: app
        containers:
          nominatim:
            image:
              # renovate: datasource=docker
              repository: mediagis/nominatim
              tag: "5.3.2"
            command: ["/bin/bash", "-ec"]
            args:
              - |
                FIRST_REGION="$(echo "$${NOMINATIM_REGIONS}" | tr ',' ' ' | awk '{print $1}')"
                if [ -z "$${FIRST_REGION}" ]; then
                  echo "NOMINATIM_REGIONS must include at least one region"
                  exit 1
                fi
                export PBF_URL="$${NOMINATIM_DOWNURL:-https://download.geofabrik.de}/$${FIRST_REGION}-latest.osm.pbf"
                exec /app/start.sh
            env:
              # Geofabrik region paths (newline, space, or comma separated).
              NOMINATIM_REGIONS: |-
                north-america/us
                north-america/canada
                north-america/mexico
                europe/britain-and-ireland
                europe/france
                europe/germany
                europe/switzerland
                europe/norway
                europe/netherlands
                australia-oceania/new-zealand
                asia/israel-and-palestine
              NOMINATIM_DOWNURL: "https://download.geofabrik.de"
              # Disable the image's built-in replication loop; updates are managed by CronJob.
              UPDATE_MODE: "none"
              REPLICATION_URL: ""
              PROJECT_DIR: /nominatim
            envFrom:
              - secretRef:
                  name: nominatim-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 60
                  timeoutSeconds: 10
                  # US import + index takes up to ~24h; allow 30h
                  failureThreshold: 1800
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 32Gi
      nominatim-maintenance:
        type: cronjob
        cronjob:
          schedule: "@daily"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 3
        containers:
          kubectl:
            image:
              repository: registry.k8s.io/kubectl
              tag: v1.34.5
            command: ["/bin/sh", "-ec"]
            args:
              - |
                POD_NAME="$(kubectl get pods -l app.kubernetes.io/name=nominatim -o jsonpath='{.items[0].metadata.name}')"
                if [ -z "$${POD_NAME}" ]; then
                  echo "nominatim pod not found"
                  exit 1
                fi
                kubectl exec "$${POD_NAME}" -c nominatim -- /bin/bash /scripts/maintain-regions.sh
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
        pod:
          restartPolicy: Never
        serviceAccount:
          identifier: maintenance

    defaultPodOptions:
      priorityClassName: internal-only

    service:
      nominatim:
        controller: *app
        ports:
          http:
            port: 80
            targetPort: 8080
    route:
      nominatim:
        hostnames:
          - nominatim.zebernst.dev
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https

    persistence:
      pgdata:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 400Gi
        storageClass: ceph-block
        advancedMounts:
          nominatim:
            nominatim:
              - path: /var/lib/postgresql/16/main
      project:
        existingClaim: nominatim-project
        advancedMounts:
          nominatim:
            nominatim:
              - path: /nominatim
      scripts:
        type: configMap
        name: nominatim-scripts
        defaultMode: 0755
        advancedMounts:
          nominatim:
            nominatim:
              - path: /scripts/maintain-regions.sh
                subPath: maintain-regions.sh
