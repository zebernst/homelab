# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nominatim
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      nominatim:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          nominatim:
            image:
              # renovate: datasource=docker
              repository: mediagis/nominatim
              tag: "5.3.2"
            # Remove import-finished on every start so our custom init.sh always runs.
            # init.sh exits immediately when no new regions are pending.
            command: ["/bin/bash", "-c"]
            args:
              - "rm -f /var/lib/postgresql/16/main/import-finished && exec /app/start.sh"
            env:
              # Space- or comma-separated Geofabrik region paths, e.g.:
              #   "north-america/us europe/france europe/great-britain"
              # Adding a new entry triggers nominatim add-data on the next pod restart.
              NOMINATIM_REGIONS: "north-america/us"
              PROJECT_DIR: /nominatim
            envFrom: &envFrom
              - secretRef:
                  name: nominatim-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 30
                  periodSeconds: 60
                  timeoutSeconds: 10
                  # US import + index takes up to ~24h; allow 30h
                  failureThreshold: 1800
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 32Gi
          replication:
            image:
              repository: mediagis/nominatim
              tag: "5.3.2"
            command: ["/bin/bash", "/scripts/update.sh"]
            env:
              NOMINATIM_REGIONS: "north-america/us"
              PROJECT_DIR: /nominatim
              # How often to poll each region for OSM updates (seconds)
              REPLICATION_RECHECK_INTERVAL: "3600"
              # Connect to the PostgreSQL socket shared with the main container
              NOMINATIM_DATABASE_DSN: "pgsql:dbname=nominatim"
              PGPASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: nominatim-secret
                    key: NOMINATIM_PASSWORD
            envFrom: *envFrom
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi

    configMaps:
      scripts:
        data:
          init.sh: |
            #!/bin/bash -ex

            DOWNURL="${NOMINATIM_DOWNURL:-https://download.geofabrik.de}"
            PROJECT_DIR="${PROJECT_DIR:-/nominatim}"
            IMPORTED_LIST="${PROJECT_DIR}/imported-regions.txt"

            if [ -z "${THREADS:-}" ]; then
              THREADS=$(nproc)
            fi

            if [ -z "${NOMINATIM_REGIONS:-}" ]; then
              echo "[nominatim-init] ERROR: NOMINATIM_REGIONS is not set"
              exit 1
            fi

            mapfile -t ALL_REGIONS < <(
              echo "${NOMINATIM_REGIONS}" | tr ',' ' ' | tr ' ' '\n' | sed '/^[[:space:]]*$/d'
            )

            if [ ! -f "${IMPORTED_LIST}" ]; then
              # ── INITIAL IMPORT ────────────────────────────────────────────
              echo "[nominatim-init] First boot — importing ${#ALL_REGIONS[@]} region(s)"

              if [ ! -f /var/lib/postgresql/16/main/PG_VERSION ]; then
                chown postgres:postgres /var/lib/postgresql/16/main
                sudo -u postgres /usr/lib/postgresql/16/bin/initdb -D /var/lib/postgresql/16/main
              fi

              cp /etc/postgresql/16/main/conf.d/postgres-import.conf.disabled \
                 /etc/postgresql/16/main/conf.d/postgres-import.conf

              sudo service postgresql start

              sudo -E -u postgres psql postgres -tAc \
                "SELECT 1 FROM pg_roles WHERE rolname='nominatim'" | grep -q 1 \
                || sudo -E -u postgres createuser -s nominatim
              sudo -E -u postgres psql postgres -tAc \
                "SELECT 1 FROM pg_roles WHERE rolname='www-data'" | grep -q 1 \
                || sudo -E -u postgres createuser -SDR www-data
              sudo -E -u postgres psql postgres -c \
                "ALTER USER nominatim WITH ENCRYPTED PASSWORD '${NOMINATIM_PASSWORD}'"
              sudo -E -u postgres psql postgres -c \
                "ALTER USER \"www-data\" WITH ENCRYPTED PASSWORD '${NOMINATIM_PASSWORD}'"
              sudo -E -u postgres psql postgres -c "DROP DATABASE IF EXISTS nominatim"

              chown -R nominatim:nominatim "${PROJECT_DIR}"

              IMPORT_ARGS=()
              for region in "${ALL_REGIONS[@]}"; do
                fname="/tmp/$(echo "${region}" | tr '/' '-')-latest.osm.pbf"
                echo "[nominatim-init] Downloading ${region}..."
                curl -L -A "${USER_AGENT}" --fail-with-body \
                  "${DOWNURL}/${region}-latest.osm.pbf" -o "${fname}"
                IMPORT_ARGS+=(--osm-file "${fname}")
              done

              cd "${PROJECT_DIR}"
              sudo -E -u nominatim nominatim import "${IMPORT_ARGS[@]}" --threads "${THREADS}"
              sudo -E -u nominatim nominatim index --threads "${THREADS}"
              sudo -E -u nominatim nominatim admin --check-database

              # Seed per-region sequence state for the replication sidecar
              for region in "${ALL_REGIONS[@]}"; do
                mkdir -p "${PROJECT_DIR}/update/${region}"
                curl -s "${DOWNURL}/${region}-updates/state.txt" \
                  > "${PROJECT_DIR}/update/${region}/sequence.state"
              done

              export NOMINATIM_QUERY_TIMEOUT=600
              export NOMINATIM_REQUEST_TIMEOUT=3600
              sudo -H -E -u nominatim nominatim admin --warm
              export NOMINATIM_QUERY_TIMEOUT=10
              export NOMINATIM_REQUEST_TIMEOUT=60

              sudo -E -u nominatim psql -d nominatim -c "ANALYZE VERBOSE"

              sudo service postgresql stop
              rm /etc/postgresql/16/main/conf.d/postgres-import.conf

              for region in "${ALL_REGIONS[@]}"; do
                rm -f "/tmp/$(echo "${region}" | tr '/' '-')-latest.osm.pbf"
              done

              printf '%s\n' "${ALL_REGIONS[@]}" > "${IMPORTED_LIST}"
              echo "[nominatim-init] Initial import complete."

            else
              # ── INCREMENTAL ADD FOR NEW REGIONS ──────────────────────────
              NEW_REGIONS=()
              for region in "${ALL_REGIONS[@]}"; do
                grep -qxF "${region}" "${IMPORTED_LIST}" || NEW_REGIONS+=("${region}")
              done

              if [ "${#NEW_REGIONS[@]}" -eq 0 ]; then
                echo "[nominatim-init] All regions already imported — nothing to do."
                exit 0
              fi

              echo "[nominatim-init] Adding ${#NEW_REGIONS[@]} new region(s): ${NEW_REGIONS[*]}"

              sudo service postgresql start
              chown -R nominatim:nominatim "${PROJECT_DIR}"
              cd "${PROJECT_DIR}"

              for region in "${NEW_REGIONS[@]}"; do
                fname="/tmp/$(echo "${region}" | tr '/' '-')-latest.osm.pbf"
                echo "[nominatim-init] Downloading ${region}..."
                curl -L -A "${USER_AGENT}" --fail-with-body \
                  "${DOWNURL}/${region}-latest.osm.pbf" -o "${fname}"

                sudo -E -u nominatim nominatim add-data --file "${fname}"

                mkdir -p "${PROJECT_DIR}/update/${region}"
                curl -s "${DOWNURL}/${region}-updates/state.txt" \
                  > "${PROJECT_DIR}/update/${region}/sequence.state"

                rm -f "${fname}"
                echo "${region}" >> "${IMPORTED_LIST}"
              done

              sudo -E -u nominatim nominatim index --threads "${THREADS}"
              sudo -E -u nominatim nominatim admin --check-database

              sudo service postgresql stop
              echo "[nominatim-init] Incremental import complete."
            fi

          update.sh: |
            #!/bin/bash
            set -euo pipefail

            DOWNURL="${NOMINATIM_DOWNURL:-https://download.geofabrik.de}"
            PROJECT_DIR="${PROJECT_DIR:-/nominatim}"
            INTERVAL="${REPLICATION_RECHECK_INTERVAL:-3600}"

            mapfile -t REGIONS < <(
              echo "${NOMINATIM_REGIONS}" | tr ',' ' ' | tr ' ' '\n' | sed '/^[[:space:]]*$/d'
            )

            echo "[nominatim-replication] Waiting for Nominatim API..."
            until curl -sf http://127.0.0.1:8080/status 2>/dev/null \
                | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('status')==0 else 1)" \
                2>/dev/null; do
              sleep 30
            done
            echo "[nominatim-replication] Ready — starting update loop."

            while true; do
              CHANGED=false

              for region in "${REGIONS[@]}"; do
                state_file="${PROJECT_DIR}/update/${region}/sequence.state"
                if [[ ! -f "${state_file}" ]]; then
                  echo "[nominatim-replication] No state file for ${region}, skipping"
                  continue
                fi

                changes="/tmp/changes-$(echo "${region}" | tr '/' '-').osc.gz"
                echo "[nominatim-replication] Fetching changes for ${region}..."

                if pyosmium-get-changes \
                    --server "${DOWNURL}/${region}-updates/" \
                    --state-file "${state_file}" \
                    -o "${changes}" 2>/dev/null && [[ -s "${changes}" ]]; then
                  sudo -E -u nominatim nominatim add-data \
                    --project-dir "${PROJECT_DIR}" \
                    --diff "${changes}"
                  CHANGED=true
                fi
                rm -f "${changes}"
              done

              if [[ "${CHANGED}" == "true" ]]; then
                echo "[nominatim-replication] Indexing changes..."
                sudo -E -u nominatim nominatim index --project-dir "${PROJECT_DIR}"
              fi

              echo "[nominatim-replication] Cycle done. Sleeping ${INTERVAL}s..."
              sleep "${INTERVAL}"
            done

    defaultPodOptions:
      priorityClassName: internal-only

    service:
      nominatim:
        controller: *app
        ports:
          http:
            port: 80
            targetPort: 8080

    persistence:
      pgdata:
        existingClaim: nominatim-pgdata
        advancedMounts:
          nominatim:
            nominatim:
              - path: /var/lib/postgresql/16/main
      project:
        existingClaim: nominatim-project
        advancedMounts:
          nominatim:
            nominatim:
              - path: /nominatim
            replication:
              - path: /nominatim
      pg-socket:
        type: emptyDir
        globalMounts:
          - path: /var/run/postgresql
      scripts:
        type: configMap
        name: nominatim-scripts
        defaultMode: 0755
        advancedMounts:
          nominatim:
            nominatim:
              - path: /app/init.sh
                subPath: init.sh
            replication:
              - path: /scripts/update.sh
                subPath: update.sh
