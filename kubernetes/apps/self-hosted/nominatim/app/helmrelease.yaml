# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app nominatim
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  install:
    disableWait: true
  upgrade:
    disableWait: true

  values:
    serviceAccount:
      app:
        enabled: true
      replication:
        enabled: true
    rbac:
      roles:
        replication:
          type: Role
          rules:
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get"]
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["get", "list"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
      bindings:
        replication:
          type: RoleBinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            identifier: replication
          subjects:
            - identifier: replication
    controllers:
      nominatim:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: app
        containers:
          nominatim:
            image:
              repository: mediagis/nominatim
              # renovate: datasource=docker depName=mediagis/nominatim
              tag: "5.3.2"
            command: ["/bin/bash", "/scripts/start.sh"]
            env:
              # Geofabrik region paths (newline, space, or comma separated).
              NOMINATIM_REGIONS: |-
                north-america/us
                north-america/canada
                north-america/mexico
                europe/britain-and-ireland
                europe/france
                europe/germany
                europe/switzerland
                europe/norway
                europe/netherlands
                australia-oceania/new-zealand
                asia/israel-and-palestine
              NOMINATIM_DOWNURL: "https://download.geofabrik.de"
              # Disable the image's built-in replication loop; updates are managed by CronJob.
              UPDATE_MODE: "none"
              REPLICATION_URL: ""
              IMPORT_WIKIPEDIA: "true"
              IMPORT_SECONDARY_WIKIPEDIA: "true"
              IMPORT_US_POSTCODES: "true"
              PROJECT_DIR: /nominatim
              POSTGRES_SHARED_BUFFERS: 2GB
              POSTGRES_MAINTENANCE_WORK_MEM: 4GB
              POSTGRES_AUTOVACUUM_WORK_MEM: 1GB
              POSTGRES_EFFECTIVE_CACHE_SIZE: 12GB
              GUNICORN_WORKERS: "4"
              NOMINATIM_API_POOL_SIZE: "5"
              # Daily cron only applies incremental OSC updates; full region PBF imports are opt-in.
              NOMINATIM_ALLOW_REGION_IMPORT: "false"
              NOMINATIM_IMPORT_MAX_REGIONS: "1"
            envFrom:
              - secretRef:
                  name: nominatim-secret
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 10
                  # US import + index takes up to ~24h; allow 30h
                  failureThreshold: 3600
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /status
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 500m
                memory: 32Gi
              limits:
                memory: 32Gi
      ui:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          identifier: app
        initContainers:
          ui-init:
            image:
              repository: docker.io/library/alpine
              # renovate: datasource=docker depName=library/alpine
              tag: 3.21.3
            command: ["/bin/sh", "/scripts/init-ui.sh"]
            env:
              # renovate: datasource=github-releases depName=osm-search/nominatim-ui
              NOMINATIM_UI_VERSION: "3.11.0"
        containers:
          ui:
            image:
              repository: docker.io/library/nginx
              # renovate: datasource=docker depName=library/nginx
              tag: 1.27.5-alpine
            probes:
              liveness: &uiProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /search.html
                    port: 80
                  initialDelaySeconds: 0
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *uiProbe
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
      update-osm-db:
        type: cronjob
        cronjob:
          schedule: "@daily"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 3
          # Kill stuck kubectl exec sessions (e.g. multi-day add-data) after 12h.
          activeDeadlineSeconds: 43200
          ttlSecondsAfterFinished: 86400
          backoffLimit: 0
        containers:
          kubectl:
            image:
              repository: registry.k8s.io/kubectl
              # renovate: datasource=docker depName=registry.k8s.io/kubectl
              tag: v1.34.5
            args:
              - exec
              - deploy/nominatim
              - -c
              - nominatim
              - --
              - /bin/bash
              - /scripts/maintain-regions.sh
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi
        pod:
          restartPolicy: Never
        serviceAccount:
          identifier: replication

    defaultPodOptions:
      priorityClassName: internal-only

    service:
      nominatim:
        controller: nominatim
        ports:
          http:
            port: 80
            targetPort: 8080
      ui:
        controller: ui
        forceRename: nominatim-ui
        ports:
          http:
            port: 80

    persistence:
      pgdata:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 400Gi
        storageClass: ceph-block
        advancedMounts:
          nominatim:
            nominatim:
              - path: /var/lib/postgresql/16/main
      project:
        existingClaim: nominatim-project
        advancedMounts:
          nominatim:
            nominatim:
              - path: /nominatim
      flatnode:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: ceph-block
        advancedMounts:
          nominatim:
            nominatim:
              - path: /nominatim/flatnode
      scripts:
        type: configMap
        name: nominatim-scripts
        defaultMode: 0755
        advancedMounts:
          nominatim:
            nominatim:
              - path: /scripts
          ui:
            ui-init:
              - path: /scripts
      ui-www:
        type: emptyDir
        advancedMounts:
          ui:
            ui-init:
              - path: /ui-www
            ui:
              - path: /ui-www
                readOnly: true
      ui-nginx:
        type: configMap
        name: nominatim-nginx
        advancedMounts:
          ui:
            ui:
              - path: /etc/nginx/conf.d
                readOnly: true
      import-staging:
        type: emptyDir
        advancedMounts:
          nominatim:
            nominatim:
              - path: /import-staging
      dev-shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 4Gi
        advancedMounts:
          nominatim:
            nominatim:
              - path: /dev/shm
