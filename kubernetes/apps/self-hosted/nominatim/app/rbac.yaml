---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nominatim-maintenance
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nominatim-maintenance
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nominatim-maintenance
subjects:
  - kind: ServiceAccount
    name: nominatim-maintenance
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nominatim-maintenance
