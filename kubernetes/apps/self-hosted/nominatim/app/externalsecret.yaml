---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nominatim
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: nominatim-secret
    template:
      engineVersion: v2
      data:
        NOMINATIM_PASSWORD: "{{ .NOMINATIM_PASSWORD }}"
        # CNPG cutover (Task 6 flips Deployment to start-external.sh). Physical
        # clone preserves the existing `nominatim` role; password stays the
        # app's NOMINATIM_PASSWORD from 1Password item `nominatim`.
        # Do not merge this branch until Task 6 also lands — DSN in envFrom
        # would divert mediagis tools away from embedded Postgres mid-cutover.
        NOMINATIM_DATABASE_DSN: "pgsql:dbname=nominatim;host=nominatim-db-rw.self-hosted.svc;user=nominatim;password={{ .NOMINATIM_PASSWORD }}"
        PGHOST: nominatim-db-rw.self-hosted.svc
        PGDATABASE: nominatim
        PGUSER: nominatim
        PGPASSWORD: "{{ .NOMINATIM_PASSWORD }}"
  dataFrom:
    - extract:
        key: nominatim
