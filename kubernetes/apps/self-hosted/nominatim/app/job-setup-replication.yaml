---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nominatim-pg-replication-setup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nominatim-pg-replication-setup
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nominatim-pg-replication-setup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nominatim-pg-replication-setup
subjects:
  - kind: ServiceAccount
    name: nominatim-pg-replication-setup
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nominatim-setup-replication
  labels:
    app.kubernetes.io/name: nominatim
    app.kubernetes.io/component: nominatim-pg-replication-setup
spec:
  # GitOps-safe replacement for an imperative `kubectl exec ... CREATE ROLE` /
  # pg_hba edit: default suspended so Flux reconciling this manifest never
  # runs it on its own. To run: commit `suspend: false` (see
  # `task nominatim:pg-source-status` / `task -w` docs), wait for completion,
  # then commit `suspend: true` again for cleanliness. `spec.template` is
  # immutable once a Job has run, so a later re-run (e.g. after rotating
  # `nominatim-replication`) requires renaming this Job (bump a suffix) in
  # git rather than re-flipping `suspend` on the same object. The target
  # script (scripts/setup-replication.sh) is idempotent either way.
  suspend: true
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nominatim
        app.kubernetes.io/component: nominatim-pg-replication-setup
    spec:
      serviceAccountName: nominatim-pg-replication-setup
      restartPolicy: Never
      containers:
        - name: kubectl
          image: registry.k8s.io/kubectl:v1.36.2
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              exec kubectl -n "${NS}" exec "deploy/${DEPLOYMENT}" -c "${CONTAINER}" -- \
                env REPL_USER="${REPL_USER}" REPL_PASSWORD="${REPL_PASSWORD}" REPL_CIDR="${REPL_CIDR}" \
                /bin/bash /scripts/setup-replication.sh
          env:
            - name: NS
              value: self-hosted
            - name: DEPLOYMENT
              value: nominatim
            - name: CONTAINER
              value: nominatim
            - name: REPL_USER
              value: cnpg_replica
            - name: REPL_CIDR
              value: 10.244.0.0/16
            - name: REPL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nominatim-replication
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
