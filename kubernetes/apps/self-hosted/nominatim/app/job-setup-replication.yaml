# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.34.0/job-batch-v1.json
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nominatim-pg-replication-setup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nominatim-pg-replication-setup
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nominatim-pg-replication-setup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nominatim-pg-replication-setup
subjects:
  - kind: ServiceAccount
    name: nominatim-pg-replication-setup
---
apiVersion: batch/v1
kind: Job
metadata:
  name: nominatim-setup-replication
  labels:
    app.kubernetes.io/name: nominatim
    app.kubernetes.io/component: nominatim-pg-replication-setup
spec:
  # Default suspended so Flux never auto-runs role/pg_hba setup.
  # Enable once via git (`suspend: false`), then re-suspend after success.
  # To re-run later, rename the Job (template is immutable after start).
  suspend: true
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nominatim
        app.kubernetes.io/component: nominatim-pg-replication-setup
    spec:
      serviceAccountName: nominatim-pg-replication-setup
      restartPolicy: Never
      containers:
        - name: kubectl
          image: registry.k8s.io/kubectl:v1.36.2
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              exec kubectl -n "${NS}" exec "deploy/${DEPLOYMENT}" -c "${CONTAINER}" -- \
                env REPL_USER="${REPL_USER}" REPL_PASSWORD="${REPL_PASSWORD}" REPL_CIDR="${REPL_CIDR}" \
                /bin/bash /scripts/setup-replication.sh
          env:
            - name: NS
              value: self-hosted
            - name: DEPLOYMENT
              value: nominatim
            - name: CONTAINER
              value: nominatim
            - name: REPL_USER
              value: cnpg_replica
            - name: REPL_CIDR
              value: 10.244.0.0/16
            - name: REPL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nominatim-replication
                  key: password
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
