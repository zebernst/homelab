# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/cluster_v1.json
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nominatim-db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgis:16-3.4
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  superuserSecret:
    name: nominatim-db-secret
  storage:
    size: 400Gi
    storageClass: ceph-block
  resources:
    requests:
      cpu: "2"
      memory: 24Gi
    limits:
      memory: 28Gi
  affinity:
    # Prefer same node as Nominatim API/flatnode (not UI / import Jobs).
    additionalPodAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: nominatim
                app.kubernetes.io/controller: nominatim
            topologyKey: kubernetes.io/hostname
  postgresql:
    # Nominatim tuning: https://nominatim.org/release-docs/latest/admin/Installation/#tuning-the-postgresql-database
    # Deliberately omitted: wal_level=minimal / max_wal_senders=0 (incompatible with CNPG WAL archiving + Barman).
    parameters:
      max_connections: "100"                 # Cap concurrent clients; API pool + imports share this envelope
      shared_buffers: 2GB                    # Shared page cache; matches Nominatim's recommended 2GB
      maintenance_work_mem: 4GB              # VACUUM/CREATE INDEX/osm2pgsql; docs ~10GB on 128GB hosts — scaled to ~24–28Gi pod
      autovacuum_work_mem: 1GB               # Per-autovacuum worker; docs suggest 2GB — lowered so vacuum doesn't starve imports
      effective_cache_size: 12GB             # Planner hint for OS+PG cache (~half of pod RAM); not in Nominatim's list
      work_mem: 50MB                         # Per-sort/hash memory; matches Nominatim's 50MB guidance
      synchronous_commit: "off"              # Skip WAL flush wait per commit; Nominatim tradeoff for import/update throughput
      checkpoint_timeout: 10min              # Time between checkpoints; docs suggest 60min — shorter for recovery/WAL under Barman
      checkpoint_completion_target: "0.9"    # Spread checkpoint I/O over most of the interval; matches Nominatim
      max_wal_size: 1GB                      # Soft WAL size before forced checkpoint; matches Nominatim's 1GB
      random_page_cost: "1.0"                # Non-sequential read cost; 1.0 for SSD/NVMe (Nominatim default assumes fast disk)
  bootstrap:
    initdb:
      database: nominatim
      owner: nominatim
      secret:
        name: nominatim-db-app-user
  managed:
    roles:
      - name: nominatim
        ensure: present
        login: true
        comment: Nominatim application role
        passwordSecret:
          name: nominatim-db-app-user
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: nominatim-db-backup
        serverName: nominatim-db-v1
  monitoring:
    enablePodMonitor: true
