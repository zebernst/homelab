# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/scheduledbackup_v1.json
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nominatim-db
spec:
  schedule: "@daily"
  # Keep false until after promotion (replica.enabled: false); avoid plugin
  # backups racing basebackup/streaming from nominatim-legacy.
  immediate: false
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  cluster:
    name: nominatim-db
