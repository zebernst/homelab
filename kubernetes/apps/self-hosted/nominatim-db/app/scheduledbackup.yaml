# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/postgresql.cnpg.io/scheduledbackup_v1.json
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nominatim-db
spec:
  schedule: "@daily"
  # Set true once via git after cutover to force the first plugin backup, then
  # leave false (or keep true if you prefer an immediate on every reconcile).
  immediate: false
  backupOwnerReference: self
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  cluster:
    name: nominatim-db
