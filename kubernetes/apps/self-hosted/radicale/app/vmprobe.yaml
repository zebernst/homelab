apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: radicale
spec:
  interval: 1m
  module: http_2xx
  vmProberSpec:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      targets:
        - http://radicale.self-hosted.svc.cluster.local:5232/
