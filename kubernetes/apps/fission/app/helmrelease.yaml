# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fission
spec:
  interval: 30m
  chart:
    spec:
      chart: fission-all
      version: "1.27.x"
      sourceRef:
        kind: HelmRepository
        name: fission-charts
        namespace: flux-system

  values:
    defaultNamespace: fission
    pullPolicy: Always
    routerServiceType: LoadBalancer
    analytics: false
    persistence:
      enabled: true
      storageClass: ceph-block
      size: 8Gi
    mqt_keda:
      enabled: false
    canaryDeployment:
      enabled: false
    serviceMonitor:
      enabled: true
    # Let the router manage HTTPRoutes for HTTPTriggers (attach mode).
    gatewayAPI:
      enabled: true
      defaultParentRef: kube-system/external
    webhook:
      certManager:
        enabled: true
