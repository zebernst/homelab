---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmservicescrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: fission-router
spec:
  selector:
    matchLabels:
      application: fission-router
      app.kubernetes.io/instance: fission
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1m
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmservicescrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: fission-controller
spec:
  selector:
    matchLabels:
      application: fission-controller
      app.kubernetes.io/instance: fission
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1m
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmservicescrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: fission-executor
spec:
  selector:
    matchLabels:
      application: fission-executor
      app.kubernetes.io/instance: fission
  endpoints:
    - port: metrics
      path: /metrics
      interval: 1m
