---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: ics-on-call
  namespace: fission
spec:
  environment:
    name: python
    namespace: fission
  package:
    packageref:
      name: ics-on-call
      namespace: fission
    functionName: main
  secrets:
    - name: ics-on-call-secret
      namespace: fission
  executor:
    executortype: poolmgr
    requestsPerPod: 1
  functionTimeout: 60
  idleTimeout: 120
