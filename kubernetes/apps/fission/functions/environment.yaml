---
apiVersion: fission.io/v1
kind: Environment
metadata:
  name: python
  namespace: fission
spec:
  version: 2
  runtime:
    image: ghcr.io/zebernst/fission-python-runtime:latest
    container:
      imagePullPolicy: Always
  builder:
    image: ghcr.io/zebernst/fission-python-builder:latest
    command: build
    container:
      imagePullPolicy: Always
  poolsize: 3
