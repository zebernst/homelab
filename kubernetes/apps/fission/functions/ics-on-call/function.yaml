---
apiVersion: fission.io/v1
kind: Function
metadata:
  name: ics-on-call
  namespace: fission
spec:
  environment:
    name: python
    namespace: fission
  package:
    packageref:
      name: ics-on-call
      namespace: fission
    functionName: main
  secrets:
    - name: ics-on-call-secret
      namespace: fission
  configmaps:
    - name: ics-on-call-config
      namespace: fission
  InvokeStrategy:
    StrategyType: execution
    ExecutionStrategy:
      ExecutorType: poolmgr
  functionTimeout: 60
  idletimeout: 120
