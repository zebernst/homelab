---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ics-on-call
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ics-on-call-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        upstream-url: "{{ .JSM_ICS_URL }}"
  dataFrom:
    - extract:
        key: ics-on-call
