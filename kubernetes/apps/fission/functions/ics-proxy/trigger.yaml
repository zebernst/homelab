---
apiVersion: fission.io/v1
kind: HTTPTrigger
metadata:
  name: ics-proxy
  namespace: fission
spec:
  relativeurl: /ics/proxy
  method: GET
  functionref:
    type: name
    name: ics-proxy
  routeConfig:
    provider: gateway
    hostnames:
      - fn.zebernst.dev
    path: /ics/proxy
    gateway:
      parentRefs:
        - name: external
          namespace: kube-system
          sectionName: https
