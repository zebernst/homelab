---
apiVersion: fission.io/v1
kind: Package
metadata:
  name: ics-proxy
  namespace: fission
spec:
  environment:
    name: python-fastapi
    namespace: fission
  deployment:
    type: oci
    oci:
      # Digest is bumped by .github/workflows/fission-function-build.yaml on main.
      # renovate: datasource=docker depName=ghcr.io/zebernst/fission-ics-proxy
      image: ghcr.io/zebernst/fission-ics-proxy:main
      imagePullSecrets:
        - name: ghcr-pull-secret
