# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-db-secret
    template:
      engineVersion: v2
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .DB_USER }}"
        password: "{{ .DB_PASS }}"
  dataFrom:
    - extract:
        key: immich
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-secret
    template:
      engineVersion: v2
      data:
        DB_HOSTNAME: immich-db-rw.media.svc.cluster.local
        DB_PORT: "5432"
        DB_DATABASE_NAME: immich
        DB_USERNAME: "{{ .DB_USER }}"
        DB_PASSWORD: "{{ .DB_PASS }}"
  dataFrom:
    - extract:
        key: immich
