# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app capacitarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      capacitarr:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          capacitarr:
            image:
              repository: ghentstarshadow/capacitarr
              tag: 1.9.0
            env:
              TZ: America/Chicago
              PUID: 568
              PGID: 568
            envFrom:
              - secretRef:
                  name: capacitarr-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: &port 2187
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probe
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi

    defaultPodOptions:
      priorityClassName: media-core
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch

    service:
      capacitarr:
        controller: *app
        forceRename: *app
        ports:
          http:
            port: *port

    route:
      capacitarr:
        hostnames:
          - "{{ .Release.Name }}.zebernst.dev"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https

    persistence:
      config:
        existingClaim: capacitarr
        globalMounts:
          - path: /config
