# yaml-language-server: $schema=https://json.schemastore.org/kustomization
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: plex-vm-rules
    files:
      - plex.yaml=vmrule.yaml
    options:
      labels:
        vm_rule: "true"
generatorOptions:
  disableNameSuffixHash: true
