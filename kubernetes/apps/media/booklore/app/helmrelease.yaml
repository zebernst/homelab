# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app booklore
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      *app :
        containers:
          *app :
            image:
              repository: ghcr.io/booklore-app/booklore
              tag: v2.0.0

            env:
              TZ: America/Chicago
              USER_ID: 1568
              GROUP_ID: 65568
              DATABASE_URL: "jdbc:mariadb://mariadb.database.svc.cluster.local:3306/booklore"
              DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: booklore-secret
                    key: DATABASE_USERNAME
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore-secret
                    key: DATABASE_PASSWORD
              SWAGGER_ENABLED: "false"

            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 6060
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe

          bookdrop-sync:
            image:
              repository: busybox
              tag: latest
            command: [sh, -c]
            args:
              - |
                touch /tmp/last_sync
                while true; do
                  find /media/bookdrop -maxdepth 2 -newer /tmp/last_sync \( -name "*.epub" -o -name "*.pdf" -o -name "*.mobi" -o -name "*.cbz" -o -name "*.cbr" \) | while read f; do
                    mv "$f" /bookdrop/ && printf "moved %s to bookdrop\n" "$f"
                  done
                  touch /tmp/last_sync
                  sleep 10
                done
            securityContext:
              runAsUser: 1568
              runAsGroup: 65568

    defaultPodOptions:
      priorityClassName: media-core
      securityContext:
        supplementalGroups: [65568]

    service:
      app :
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.zebernst.dev"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https

    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /app/data

      media:
        type: nfs
        server: nas.internal
        path: /volume1/media
        advancedMounts:
          *app :
            *app :
              - path: /books
                subPath: books
            bookdrop-sync:
              - path: /media/bookdrop
                subPath: bookdrop

      bookdrop:
        type: emptyDir
        globalMounts:
          - path: /bookdrop
