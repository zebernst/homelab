---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: autobrr
spec:
  groups:
    - name: autobrr.rules
      rules:
        - alert: AutobrrNetworkUnmonitored
          expr: |
            autobrr_irc_channel_enabled_total != autobrr_irc_channel_monitored_total
          for: 5m
          annotations:
            summary: >-
              One or more IRC channels on the {{ $labels.network }} network are enabled but not being monitored
          labels:
            severity: critical
