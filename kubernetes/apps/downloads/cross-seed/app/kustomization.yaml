# yaml-language-server: $schema=https://json.schemastore.org/kustomization
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - externalsecret.yaml
  - helmrelease.yaml
  - vmprobe.yaml
configMapGenerator:
  - name: cross-seed-configmap
    files:
      - resources/config.js
  - name: cross-seed-vmalert-rules
    files:
      - cross-seed.yaml=resources/alert-rules.yaml
    options:
      labels:
        vmalert.io/rule: "true"
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
