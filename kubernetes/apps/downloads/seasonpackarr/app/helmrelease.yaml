# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app seasonpackarr
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      *app:
        containers:
          *app:
            image:
              repository: ghcr.io/nuxencs/seasonpackarr
              tag: v0.14.0
            env:
              SEASONPACKARR__DISABLE_CONFIG_FILE: "true"
              SEASONPACKARR__HOST: 0.0.0.0
              SEASONPACKARR__PORT: &port 80
              SEASONPACKARR__LOG_LEVEL: INFO
              SEASONPACKARR__SMART_MODE: "true"
              SEASONPACKARR__SMART_MODE_THRESHOLD: "0.75"
              SEASONPACKARR__PARSE_TORRENT_FILE: "true"
              SEASONPACKARR__FUZZY_MATCHING_SKIP_REPACK_COMPARE: "true"
              SEASONPACKARR__CLIENTS_DEFAULT_HOST: qbittorrent.downloads.svc.cluster.local
              SEASONPACKARR__CLIENTS_DEFAULT_PORT: "80"
              SEASONPACKARR__CLIENTS_DEFAULT_PREIMPORTPATH: /media/downloads/qbittorrent/seeding/sonarr
              TZ: America/Chicago
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/healthz/readiness
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      priorityClassName: media-core
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      *app:
        controller: *app
        ports:
          http:
            port: *port

    persistence:
      media:
        type: nfs
        server: nas.internal
        path: /volume1/media
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
