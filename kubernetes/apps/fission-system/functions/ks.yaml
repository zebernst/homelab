# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app fission-functions
  namespace: &ns fission-system
spec:
  targetNamespace: fission
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: fission
      namespace: *ns
    - name: onepassword
      namespace: external-secrets
  interval: 30m
  retryInterval: 1m
  path: kubernetes/apps/fission-system/functions/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
