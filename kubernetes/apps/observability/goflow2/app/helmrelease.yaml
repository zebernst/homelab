# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app goflow2
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      goflow2:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          goflow2:
            image:
              repository: docker.io/netsampler/goflow2
              tag: v2.2.6@sha256:9971fb4c08adbe6519d5da38f14d3a0eefcc3c0d88cb2e49ab4c6415e99d32a0
            args:
              - -addr=0.0.0.0:8080
              - -listen=netflow://:2055,sflow://:6343
              - -format=json
              - -transport.file=/data/flows.log
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: &metricsPort 8080
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
          flow-shipper:
            image:
              repository: cr.fluentbit.io/fluent/fluent-bit
              tag: 3.2.10@sha256:41370c4edd3a09db6565271ef647a5f69808007cf6c8ce5f205e056a77a18f41
            args:
              - -c
              - /fluent-bit/etc/conf/fluent-bit.conf
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      priorityClassName: external-facing
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

    service:
      goflow2:
        controller: *app
        ports:
          metrics:
            port: *metricsPort
      goflow-flows:
        controller: *app
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.20.21, ::ffff:c0a8:1415
        ports:
          netflow:
            port: 2055
            protocol: UDP
          sflow:
            port: 6343
            protocol: UDP

    persistence:
      data:
        type: emptyDir
        advancedMounts:
          goflow2:
            goflow2:
              - path: /data
            flow-shipper:
              - path: /data
                readOnly: true
      goflow-config:
        type: configMap
        name: goflow2-configmap
        advancedMounts:
          goflow2:
            flow-shipper:
              - path: /fluent-bit/etc/conf/fluent-bit.conf
                subPath: fluent-bit.conf
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          goflow2:
            flow-shipper:
              - path: /tmp
              - path: /buffers
