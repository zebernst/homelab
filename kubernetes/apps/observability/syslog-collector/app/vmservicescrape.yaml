---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmservicescrape_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: syslog-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: syslog-collector
      app.kubernetes.io/instance: syslog-collector
  endpoints:
    - port: metrics
      path: /api/v1/metrics/prometheus
      interval: 1m
      scrapeTimeout: 10s
