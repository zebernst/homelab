# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app syslog-collector
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      syslog-collector:
        replicas: 2
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          fluent-bit:
            image:
              repository: cr.fluentbit.io/fluent/fluent-bit
              tag: 3.2.10@sha256:41370c4edd3a09db6565271ef647a5f69808007cf6c8ce5f205e056a77a18f41
            args:
              - -c
              - /fluent-bit/etc/conf/fluent-bit.conf
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &metricsPort 2020
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness: *probe
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi

    defaultPodOptions:
      priorityClassName: external-facing
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000

    service:
      syslog-collector:
        controller: *app
        ports:
          metrics:
            port: *metricsPort
      syslog-udp:
        controller: *app
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.20.20, ::ffff:c0a8:1414
        ports:
          syslog-udp:
            port: 514
            protocol: UDP
          syslog-tcp:
            port: 514
            protocol: TCP

    persistence:
      config:
        type: configMap
        name: syslog-collector-configmap
        globalMounts:
          - path: /fluent-bit/etc/conf/fluent-bit.conf
            subPath: fluent-bit.conf
            readOnly: true
