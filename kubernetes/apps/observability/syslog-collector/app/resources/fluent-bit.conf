[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

[INPUT]
    Name          syslog
    Mode          udp
    Listen        0.0.0.0
    Port          514
    Tag           syslog.udp
    Parser        syslog-rfc5424

[INPUT]
    Name          syslog
    Mode          tcp
    Listen        0.0.0.0
    Port          514
    Tag           syslog.tcp
    Parser        syslog-rfc5424

[FILTER]
    Name          modify
    Match         syslog.*
    Add           app syslog
    Add           stream network

[OUTPUT]
    Name          http
    Match         syslog.*
    Host          victoria-logs-server.observability.svc.cluster.local
    Port          9428
    URI           /insert/jsonline?_stream_fields=stream,hostname,app&_msg_field=message&_time_field=date
    Format        json_lines
    Json_date_format iso8601
    Compress      gzip
    log_response_payload Off
