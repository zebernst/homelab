---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntopng-admin
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ntopng-secret
    template:
      data:
        http-user: "{{ .username }}"
        http-password: "{{ .password }}"
  dataFrom:
    - extract:
        key: ntopng
