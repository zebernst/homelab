# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gatus
  namespace: &ns observability
spec:
  targetNamespace: *ns
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/gatus
  dependsOn:
    - name: victoria-metrics-operator
      namespace: *ns
    - name: cloudnative-pg-cluster
      namespace: database
    - name: onepassword
      namespace: external-secrets
  path: kubernetes/apps/observability/gatus/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      GATUS_PATH: /health
      GATUS_SUBDOMAIN: status
      # Placeholders for Flate/Flux postBuild (runtime values come from gatus-secret via envFrom).
      GATUS_PUSHOVER_APP_TOKEN: "0000000000000000000000000000000001"
      GATUS_PUSHOVER_USER_KEY: "0000000000000000000000000000000001"
      GATUS_WEB_PORT: "80"
      INIT_POSTGRES_DBNAME: gatus
      INIT_POSTGRES_HOST: redspot-rw.database.svc.cluster.local
      INIT_POSTGRES_PASS: gatus
      INIT_POSTGRES_USER: gatus
