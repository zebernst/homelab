---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: snmp-exporter
spec:
  groups:
    - name: snmp-exporter.rules
      labels:
        job: snmp-exporter
      rules:
        - alert: UPSOnBattery
          expr: |
            (xupsBatTimeRemaining/60 <= 20 and upsSecondsOnBattery > 0)
          annotations:
            summary: >
              UPS {{ $labels.instance }} is running on battery power and has less than {{ $value }} minutes of runtime remaining
          for: 5m
          labels:
            severity: critical
