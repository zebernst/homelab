# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: scanopy-snmp-bootstrap
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      scanopy-snmp-bootstrap:
        type: cronjob
        cronjob:
          schedule: "@hourly"
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          scanopy-snmp-bootstrap:
            image:
              repository: docker.io/library/python
              tag: 3.13-alpine
            command: ["python", "/scripts/bootstrap-snmp.py"]
            env:
              SCANOPY_API_URL: http://scanopy.observability.svc.cluster.local:60072
            envFrom:
              - secretRef:
                  name: scanopy-secret
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      priorityClassName: background
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile: { type: RuntimeDefault }
    persistence:
      scripts:
        type: configMap
        name: scanopy-snmp-bootstrap
        globalMounts:
          - path: /scripts
            readOnly: true
