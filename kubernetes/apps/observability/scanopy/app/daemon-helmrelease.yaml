# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app scanopy-daemon
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      scanopy-daemon:
        type: daemonset
        containers:
          scanopy-daemon:
            image:
              repository: ghcr.io/scanopy/scanopy/daemon
              tag: v0.16.2@sha256:421cc71effcb3daa40140a015f4ba6d6d323408ae9c0d657e0e42514a774514b
            env:
              TZ: America/Chicago
              SCANOPY_LOG_LEVEL: info
              SCANOPY_SERVER_URL: http://scanopy.observability.svc.cluster.local:60072
              SCANOPY_ENABLE_LOCAL_DOCKER_SOCKET: "false"
              SCANOPY_NAME:
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            envFrom:
              - secretRef:
                  name: scanopy-secret
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: &port 60073
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probe
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
    persistence:
      config:
        type: hostPath
        hostPath: /var/lib/scanopy-daemon
        globalMounts:
          - path: /root/.config/scanopy/daemon
      snmp-community:
        type: secret
        name: scanopy-snmp-secret
        globalMounts:
          - path: /run/secrets/unifi-snmp-community
            subPath: community
            readOnly: true
