---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/probe_v1.json
# In-cluster HTTP health checks for services without native Prometheus metrics.
# Apps with ServiceMonitors or Gatus endpoint checks are excluded.
kind: Probe
apiVersion: monitoring.coreos.com/v1
metadata:
  name: services-downloads-http
spec:
  module: http_2xx
  prober:
    url: blackbox-exporter.observability.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://whisparr.downloads.svc.cluster.local/ping
        - http://qbittorrent.downloads.svc.cluster.local/api/v2/app/version
        - http://cross-seed.downloads.svc.cluster.local/api/ping
        - http://seasonpackarr.downloads.svc.cluster.local/api/healthz/readiness
        - http://openbooks.downloads.svc.cluster.local/
