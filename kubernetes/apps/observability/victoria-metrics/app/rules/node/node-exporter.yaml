# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: node-exporter
spec:
  groups:
  - name: node-exporter
    rules:
    - alert: NodeFilesystemSpaceFillingUp
      expr: ((((node_filesystem_avail_bytes{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="cluster",fstype!="",mountpoint!=""}) * 100) < 15) and (predict_linear(node_filesystem_avail_bytes{job="cluster",fstype!="",mountpoint!=""}[6h], 86400) < 0)) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left and is filling up.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemspacefillingup
        summary: Filesystem is predicted to run out of space within the next 24 hours.
      for: 1h
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFilesystemSpaceFillingUp
      expr: ((((node_filesystem_avail_bytes{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="cluster",fstype!="",mountpoint!=""}) * 100) < 10) and (predict_linear(node_filesystem_avail_bytes{job="cluster",fstype!="",mountpoint!=""}[6h], 14400) < 0)) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left and is filling up fast.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemspacefillingup
        summary: Filesystem is predicted to run out of space within the next 4 hours.
      for: 1h
      labels:
        severity: critical
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFilesystemAlmostOutOfSpace
      expr: (((node_filesystem_avail_bytes{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="cluster",fstype!="",mountpoint!=""}) * 100) < 5) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
        summary: Filesystem has less than 5% space left.
      for: 30m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFilesystemAlmostOutOfSpace
      expr: (((node_filesystem_avail_bytes{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_size_bytes{job="cluster",fstype!="",mountpoint!=""}) * 100) < 3) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available space left.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutofspace
        summary: Filesystem has less than 3% space left.
      for: 30m
      labels:
        severity: critical
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFilesystemFilesFillingUp
      expr: ((((node_filesystem_files_free{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_files{job="cluster",fstype!="",mountpoint!=""}) * 100) < 40) and (predict_linear(node_filesystem_files_free{job="cluster",fstype!="",mountpoint!=""}[6h], 86400) < 0)) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left and is filling up.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemfilesfillingup
        summary: Filesystem is predicted to run out of inodes within the next 24 hours.
      for: 1h
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFilesystemFilesFillingUp
      expr: ((((node_filesystem_files_free{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_files{job="cluster",fstype!="",mountpoint!=""}) * 100) < 20) and (predict_linear(node_filesystem_files_free{job="cluster",fstype!="",mountpoint!=""}[6h], 14400) < 0)) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left and is filling up fast.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemfilesfillingup
        summary: Filesystem is predicted to run out of inodes within the next 4 hours.
      for: 1h
      labels:
        severity: critical
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFilesystemAlmostOutOfFiles
      expr: (((node_filesystem_files_free{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_files{job="cluster",fstype!="",mountpoint!=""}) * 100) < 5) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutoffiles
        summary: Filesystem has less than 5% inodes left.
      for: 1h
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFilesystemAlmostOutOfFiles
      expr: (((node_filesystem_files_free{job="cluster",fstype!="",mountpoint!=""} / node_filesystem_files{job="cluster",fstype!="",mountpoint!=""}) * 100) < 3) and (node_filesystem_readonly{job="cluster",fstype!="",mountpoint!=""} == 0)
      annotations:
        description: Filesystem on {{ $labels.device }}, mounted on {{ $labels.mountpoint }}, at {{ $labels.instance }} has only {{ printf "%.2f" $value }}% available inodes left.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefilesystemalmostoutoffiles
        summary: Filesystem has less than 3% inodes left.
      for: 1h
      labels:
        severity: critical
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeNetworkReceiveErrs
      expr: (rate(node_network_receive_errs_total{job="cluster"}[2m]) / rate(node_network_receive_packets_total{job="cluster"}[2m])) > 0.01
      annotations:
        description: '{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} receive errors in the last two minutes.'
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodenetworkreceiveerrs
        summary: Network interface is reporting many receive errors.
      for: 1h
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeNetworkTransmitErrs
      expr: (rate(node_network_transmit_errs_total{job="cluster"}[2m]) / rate(node_network_transmit_packets_total{job="cluster"}[2m])) > 0.01
      annotations:
        description: '{{ $labels.instance }} interface {{ $labels.device }} has encountered {{ printf "%.0f" $value }} transmit errors in the last two minutes.'
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodenetworktransmiterrs
        summary: Network interface is reporting many transmit errors.
      for: 1h
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeHighNumberConntrackEntriesUsed
      expr: (node_nf_conntrack_entries{job="cluster"} / node_nf_conntrack_entries_limit) > 0.75
      annotations:
        description: '{{ $labels.instance }} {{ $value | humanizePercentage }} of conntrack entries are used.'
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodehighnumberconntrackentriesused
        summary: Number of conntrack are getting close to the limit.
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeTextFileCollectorScrapeError
      expr: node_textfile_scrape_error{job="cluster"} == 1
      annotations:
        description: Node Exporter text file collector on {{ $labels.instance }} failed to scrape.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodetextfilecollectorscrapeerror
        summary: Node Exporter text file collector failed to scrape.
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeClockSkewDetected
      expr: ((node_timex_offset_seconds{job="cluster"} > 0.05) and (deriv(node_timex_offset_seconds{job="cluster"}[5m]) >= 0)) or ((node_timex_offset_seconds{job="cluster"} < -0.05) and (deriv(node_timex_offset_seconds{job="cluster"}[5m]) <= 0))
      annotations:
        description: Clock at {{ $labels.instance }} is out of sync by more than 0.05s. Ensure NTP is configured correctly on this host.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodeclockskewdetected
        summary: Clock skew detected.
      for: 10m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeClockNotSynchronising
      expr: (min_over_time(node_timex_sync_status{job="cluster"}[5m]) == 0) and (node_timex_maxerror_seconds{job="cluster"} >= 16)
      annotations:
        description: Clock at {{ $labels.instance }} is not synchronising. Ensure NTP is configured on this host.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodeclocknotsynchronising
        summary: Clock not synchronising.
      for: 10m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeRAIDDegraded
      expr: (node_md_disks_required{job="cluster",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"} - ignoring(state) node_md_disks{state="active",job="cluster",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}) > 0
      annotations:
        description: RAID array '{{ $labels.device }}' at {{ $labels.instance }} is in degraded state due to one or more disks failures. Number of spare drives is insufficient to fix issue automatically.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/noderaiddegraded
        summary: RAID Array is degraded.
      for: 15m
      labels:
        severity: critical
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeRAIDDiskFailure
      expr: node_md_disks{state="failed",job="cluster",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"} > 0
      annotations:
        description: At least one device in RAID array at {{ $labels.instance }} failed. Array '{{ $labels.device }}' needs attention and possibly a disk swap.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/noderaiddiskfailure
        summary: Failed device in RAID array.
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFileDescriptorLimit
      expr: ((node_filefd_allocated{job="cluster"} * 100) / node_filefd_maximum{job="cluster"}) > 70
      annotations:
        description: File descriptors limit at {{ $labels.instance }} is currently at {{ printf "%.2f" $value }}%.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefiledescriptorlimit
        summary: Kernel is predicted to exhaust file descriptors limit soon.
      for: 15m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeFileDescriptorLimit
      expr: ((node_filefd_allocated{job="cluster"} * 100) / node_filefd_maximum{job="cluster"}) > 90
      annotations:
        description: File descriptors limit at {{ $labels.instance }} is currently at {{ printf "%.2f" $value }}%.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodefiledescriptorlimit
        summary: Kernel is predicted to exhaust file descriptors limit soon.
      for: 15m
      labels:
        severity: critical
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeCPUHighUsage
      expr: (sum(avg(rate(node_cpu_seconds_total{job="cluster",mode!~"idle|iowait"}[2m])) without(cpu)) without(mode) * 100) > 90
      annotations:
        description: 'CPU usage at {{ $labels.instance }} has been above 90% for the last 15 minutes, is currently at {{ printf "%.2f" $value }}%.

          '
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodecpuhighusage
        summary: High CPU usage.
      for: 15m
      labels:
        severity: info
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeSystemSaturation
      expr: (node_load1{job="cluster"} / count(node_cpu_seconds_total{job="cluster",mode="idle"}) without(cpu,mode)) > 2
      annotations:
        description: 'System load per core at {{ $labels.instance }} has been above 2 for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.

          This might indicate this instance resources saturation and can cause it becoming unresponsive.

          '
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemsaturation
        summary: System saturated, load per core is very high.
      for: 15m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeMemoryMajorPagesFaults
      expr: rate(node_vmstat_pgmajfault{job="cluster"}[5m]) > 500
      annotations:
        description: 'Memory major pages are occurring at very high rate at {{ $labels.instance }}, 500 major page faults per second for the last 15 minutes, is currently at {{ printf "%.2f" $value }}.

          Please check that there is enough memory available at this instance.

          '
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememorymajorpagesfaults
        summary: Memory major page faults are occurring at very high rate.
      for: 15m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeMemoryHighUtilization
      expr: (100 - ((node_memory_MemAvailable_bytes{job="cluster"} / node_memory_MemTotal_bytes{job="cluster"}) * 100)) > 90
      annotations:
        description: 'Memory is filling up at {{ $labels.instance }}, has been above 90% for the last 15 minutes, is currently at {{ printf "%.2f" $value }}%.

          '
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodememoryhighutilization
        summary: Host is running out of memory.
      for: 15m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeDiskIOSaturation
      expr: rate(node_disk_io_time_weighted_seconds_total{job="cluster",device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m]) > 10
      annotations:
        description: 'Disk IO queue (aqu-sq) is high on {{ $labels.device }} at {{ $labels.instance }}, has been above 10 for the last 30 minutes, is currently at {{ printf "%.2f" $value }}.

          This symptom might indicate disk saturation.

          '
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodediskiosaturation
        summary: Disk IO queue is high.
      for: 30m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeSystemdServiceFailed
      expr: node_systemd_unit_state{job="cluster",state="failed"} == 1
      annotations:
        description: Systemd service {{ $labels.name }} has entered failed state at {{ $labels.instance }}
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemdservicefailed
        summary: Systemd service has entered failed state.
      for: 5m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeSystemdServiceCrashlooping
      expr: increase(node_systemd_service_restart_total{job="cluster"}[5m]) > 2
      annotations:
        description: Systemd service {{ $labels.name }} has being restarted too many times at {{ $labels.instance }} for the last 15 minutes. Please check if service is crash looping.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodesystemdservicecrashlooping
        summary: Systemd service keeps restaring, possibly crash looping.
      for: 15m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
    - alert: NodeBondingDegraded
      expr: (node_bonding_slaves{job="cluster"} - node_bonding_active{job="cluster"}) != 0
      annotations:
        description: Bonding interface {{ $labels.master }} on {{ $labels.instance }} is in degraded state due to one or more slave failures.
        runbook_url: https://runbooks.prometheus-operator.dev/runbooks/node/nodebondingdegraded
        summary: Bonding interface is degraded.
      for: 5m
      labels:
        severity: warning
        job: node-exporter
      keep_firing_for: 90s
