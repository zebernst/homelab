# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/operator.victoriametrics.com/vmrule_v1beta1.json
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: k8s-rules-container-memory-working-set-bytes
spec:
  groups:
  - name: k8s.rules.container_memory_working_set_bytes
    rules:
    - expr: container_memory_working_set_bytes{job="kubelet",metrics_path="/metrics/cadvisor",image!=""} * on(cluster,namespace,pod) group_left(node) topk(1, max(kube_pod_info{node!=""}) by(cluster,namespace,pod,node)) by(cluster,namespace,pod)
      record: node_namespace_pod_container:container_memory_working_set_bytes
      labels:
        job: kubernetes-recording
