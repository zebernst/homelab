# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-metrics-k8s-stack
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.79.1
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-k8s-stack
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  dependsOn:
    - name: prometheus-operator-crds
      namespace: observability
    - name: victoria-metrics-operator
      namespace: observability
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  interval: 30m

  values:
    nameOverride: vmks
    fullnameOverride: vmks
    tenant: "0"

    victoria-metrics-operator:
      enabled: false

    defaultDashboards:
      enabled: true
      defaultTimezone: America/Chicago

    defaultRules:
      create: true

    extraRules:
      dockerhub-rules:
        groups:
          - name: dockerhub
            rules:
              - alert: DockerhubRateLimitRisk
                annotations:
                  summary: Kubernetes cluster Dockerhub rate limit risk
                expr: count(time() - container_last_seen{image=~"(docker.io).*",container!=""} < 30) > 100
                labels:
                  severity: critical
      oom-rules:
        groups:
          - name: oom
            rules:
              - alert: OomKilled
                annotations:
                  summary: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.
                expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
                labels:
                  severity: critical

    grafana:
      enabled: false

    alertmanager:
      enabled: true
      useManagedConfig: true
      spec:
        externalURL: https://alertmanager.zebernst.dev
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-block
              resources:
                requests:
                  storage: 1Gi
      ingress:
        enabled: true
        ingressClassName: tailscale
        hosts:
          - alertmanager.kite-harmonic.ts.net
        tls:
          - hosts:
              - alertmanager.kite-harmonic.ts.net

    vmagent:
      enabled: true
      spec:
        selectAllByDefault: true
        scrapeInterval: 30s
        priorityClassName: control-plane-critical
        externalLabels:
          cluster: jupiter
        extraArgs:
          promscrape.dropOriginalLabels: "true"
          promscrape.maxScrapeSize: 50MiB
          promscrape.streamParse: "true"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi

    kubelet:
      vmScrape:
        spec:
          metricRelabelConfigs:
            - action: labeldrop
              regex: (uid)
            - action: labeldrop
              regex: (id|name)
            - action: drop
              source_labels: [__name__]
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
            # labelmap copies every node label onto kubelet/cadvisor metrics; GPU
            # nodes with Talos extensions + NFD + NVIDIA labels exceed the 40-label
            # vmsingle limit and spam RowsRejectedOnIngestion / TooManyLogs.
            - action: labeldrop
              regex: (extensions_talos_dev_.+|feature_node_kubernetes_io_.+|nvidia_com_gpu_.+|plan_upgrade_cattle_io_.+|beta_kubernetes_io_.+)

    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "90d"
        replicaCount: 1
        priorityClassName: control-plane-critical
        extraArgs:
          search.maxQueryDuration: 120s
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 2000Mi
        storage:
          accessModes:
            - ReadWriteOnce
          storageClassName: ceph-block
          resources:
            requests:
              storage: 50Gi
      ingress:
        enabled: true
        ingressClassName: tailscale
        hosts:
          - victoria-metrics.kite-harmonic.ts.net
        tls:
          - hosts:
              - victoria-metrics.kite-harmonic.ts.net
      route:
        enabled: true
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        hostnames:
          - victoria-metrics.zebernst.dev
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https

    vmalert:
      enabled: true
      spec:
        selectAllByDefault: true
        evaluationInterval: 30s
        externalLabels:
          cluster: jupiter
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      vmScrape:
        enabled: true
        spec:
          jobLabel: jobLabel
          endpoints:
            - port: metrics
              relabelConfigs:
                - action: replace
                  regex: (.*)
                  replacement: $1
                  sourceLabels: ["__meta_kubernetes_pod_node_name"]
                  targetLabel: kubernetes_node

    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      metricLabelsAllowlist:
        - pods=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]
      rbac:
        extraRules:
          - apiGroups: ["holmesgpt.dev"]
            resources: ["healthchecks", "scheduledhealthchecks"]
            verbs: ["list", "watch"]
      customResourceState:
        enabled: true
        config:
          spec:
            resources:
              - groupVersionKind:
                  group: holmesgpt.dev
                  version: v1alpha1
                  kind: ScheduledHealthCheck
                metrics:
                  - name: scheduled_health_check_last_result_info
                    help: "Last result of a HolmesGPT scheduled health check"
                    each:
                      type: Info
                      info:
                        labelsFromPath:
                          result: [status, lastResult]
      vmScrape:
        enabled: true
        spec:
          endpoints:
            - port: http
              honorLabels: true
              relabelConfigs:
                - action: replace
                  regex: (.*)
                  replacement: $1
                  sourceLabels: ["__meta_kubernetes_pod_node_name"]
                  targetLabel: kubernetes_node

    kubeProxy:
      enabled: false
      service:
        enabled: false

    kubeApiServer:
      vmScrape:
        spec:
          selector:
            matchLabels:
              component: apiserver
              provider: kubernetes

    kubeScheduler:
      service:
        selector:
          k8s-app: kube-scheduler
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    kubeControllerManager:
      service:
        selector:
          k8s-app: kube-controller-manager
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                insecureSkipVerify: true

    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
        port: 2381
        targetPort: 2381
      vmScrape:
        spec:
          endpoints:
            - scheme: http
