# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app pocket-id
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system

  values:
    controllers:
      *app:
        annotations:
          reloader.stakater.com/auto: "true"

        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17
            envFrom: &envFrom
              - secretRef:
                  name: pocket-id-secret

        containers:
          *app:
            image:
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2
            env:
              # Enable env-var driven config
              UI_CONFIG_DISABLED: "true"
              # Sign-up
              ALLOW_USER_SIGNUPS: withToken
              # Metrics
              METRICS_ENABLED: "true"
              OTEL_METRICS_EXPORTER: prometheus
              OTEL_EXPORTER_PROMETHEUS_HOST: 0.0.0.0
              OTEL_EXPORTER_PROMETHEUS_PORT: &metricsPort 9464
              # SMTP via maddy
              SMTP_HOST: smtp-relay.network.svc.cluster.local
              SMTP_PORT: "25"
              SMTP_FROM: noreply@zebernst.dev
              SMTP_TLS: none
              # S3 file storage via Rook/Ceph
              FILE_BACKEND: s3
              S3_ENDPOINT: http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
              S3_REGION: us-east-1
              S3_FORCE_PATH_STYLE: "true"
              S3_DISABLE_DEFAULT_INTEGRITY_CHECKS: "true"
              S3_BUCKET:
                valueFrom:
                  configMapKeyRef:
                    name: pocket-id-bucket
                    key: BUCKET_NAME
              S3_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: pocket-id-bucket
                    key: AWS_ACCESS_KEY_ID
              S3_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: pocket-id-bucket
                    key: AWS_SECRET_ACCESS_KEY
              # Email notifications
              EMAIL_VERIFICATION_ENABLED: "true"
              EMAIL_ONE_TIME_ACCESS_AS_ADMIN_ENABLED: "true"
              EMAIL_API_KEY_EXPIRATION_ENABLED: "true"
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      priorityClassName: internal-only
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      *app:
        controller: *app
        ports:
          http:
            port: &port 1411
          metrics:
            port: *metricsPort

    ingress:
      tailscale:
        className: tailscale
        hosts:
          - host: &tsHost "pocket-id.kite-harmonic.ts.net"
            paths:
              - path: /
                service:
                  identifier: *app
                  port: http
        tls:
          - hosts:
              - *tsHost

    route:
      internal:
        hostnames:
          - id.zebernst.dev
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port
      external:
        hostnames:
          - id.zebernst.dev
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    serviceMonitor:
      app:
        serviceName: *app
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
